AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S3 bucket, ACM certificate, CloudFront OAC distribution for
  rhamiltoneng.com (portfolio / engineering blog).
  Deploy in us-east-1 -- ACM certificates used by CloudFront must
  be in us-east-1.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment tag value.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # -------------------------------------------------------------------------
  # S3 -- rhamiltoneng.com site bucket (private, CloudFront OAC only)
  # -------------------------------------------------------------------------
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: rhamiltoneng-site
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # -------------------------------------------------------------------------
  # ACM Certificate -- covers rhamiltoneng.com and www.rhamiltoneng.com
  # Must be created in us-east-1 for CloudFront.
  # -------------------------------------------------------------------------
  RhamiltonengCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: rhamiltoneng.com
      SubjectAlternativeNames:
        - www.rhamiltoneng.com
      ValidationMethod: DNS
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # -------------------------------------------------------------------------
  # CloudFront OAC -- rhamiltoneng.com site
  # -------------------------------------------------------------------------
  SiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: rhamiltoneng-site-oac
        Description: OAC for rhamiltoneng.com S3 bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # -------------------------------------------------------------------------
  # CloudFront Distribution -- rhamiltoneng.com and www.rhamiltoneng.com
  # -------------------------------------------------------------------------
  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: SiteBucket
    Properties:
      DistributionConfig:
        Comment: rhamiltoneng.com portfolio site
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        Aliases:
          - rhamiltoneng.com
          - www.rhamiltoneng.com
        DefaultRootObject: index.html
        Origins:
          - Id: SiteS3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt SiteOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: SiteS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # 658327ea-f89d-4fab-a63d-7e88639e58f6 = CachingOptimized (AWS managed)
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          AcmCertificateArn: !Ref RhamiltonengCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
      Tags:
        - Key: Project
          Value: vaultmtg
        - Key: Environment
          Value: !Ref Environment

  # -------------------------------------------------------------------------
  # S3 Bucket Policy -- grant CloudFront OAC read access
  # -------------------------------------------------------------------------
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  SiteBucketName:
    Description: S3 bucket name for rhamiltoneng.com
    Value: !Ref SiteBucket
    Export:
      Name: !Sub "rhamiltoneng-${Environment}-SiteBucketName"

  DistributionId:
    Description: CloudFront distribution ID for rhamiltoneng.com
    Value: !Ref SiteDistribution
    Export:
      Name: !Sub "rhamiltoneng-${Environment}-DistributionId"

  DistributionDomain:
    Description: CloudFront domain name for rhamiltoneng.com (use as ALIAS target in Route 53)
    Value: !GetAtt SiteDistribution.DomainName
    Export:
      Name: !Sub "rhamiltoneng-${Environment}-DistributionDomain"

  CertificateArn:
    Description: ACM certificate ARN covering rhamiltoneng.com and www.rhamiltoneng.com
    Value: !Ref RhamiltonengCertificate
    Export:
      Name: !Sub "rhamiltoneng-${Environment}-CertificateArn"
