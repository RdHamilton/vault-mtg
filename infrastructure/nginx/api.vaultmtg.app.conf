# nginx server block for api.vaultmtg.app
# ADR-008: This EC2 nginx instance serves the BFF/API ONLY.
# No static frontend assets are served here.
# Frontend is served via CloudFront (vaultmtg-app-cdn stack).
#
# TLS managed by Certbot (Let's Encrypt). Lines marked "managed by Certbot"
# are written/updated automatically on renewal -- do not remove them.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    server_name api.vaultmtg.app;

    # ACME challenge passthrough for certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SSE endpoint -- must be declared BEFORE the general /api/v1/ block so nginx
    # uses this more-specific location for /api/v1/events requests.
    #
    # nginx longest-prefix matching: /api/v1/events (24 chars) beats /api/v1/ (9 chars),
    # so SSE requests are routed here and NOT into the /api/v1/ block below.
    #
    # SSE (Server-Sent Events) connections are long-lived: the client holds the
    # connection open waiting for draft-pick and game-state events. Between picks
    # the stream can be silent for minutes, which would trip the default
    # proxy_read_timeout of 60s and close the connection.
    #
    # proxy_read_timeout 300s  -- allow up to 5 minutes of silence before timing out.
    # proxy_buffering off      -- nginx MUST NOT buffer the response; SSE requires
    #                            each event to be flushed to the client immediately.
    #                            Buffering holds chunks until the buffer fills and
    #                            breaks the streaming protocol entirely.
    location /api/v1/events {
        # Handle OPTIONS preflight at the nginx layer -- mirrors the /api/v1/ block.
        # SSE clients may send a preflight before the initial EventSource connection.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*"                               always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type"     always;
            add_header Access-Control-Max-Age       "86400"                           always;
            add_header Content-Length               0                                 always;
            add_header Content-Type                 "text/plain; charset=utf-8"       always;
            return 200;
        }

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout  10s;
        proxy_read_timeout    300s;
        proxy_send_timeout     30s;
        proxy_buffering        off;

        # Strip upstream CORS headers before adding ours to prevent duplicates.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # CORS headers on all SSE responses, including error responses.
        add_header Access-Control-Allow-Origin  "*"                               always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type"     always;
    }

    # API proxy -- all /api/v1/* traffic (except /api/v1/events above) proxied
    # to the Go BFF on port 8080.
    #
    # Fix for issue #1696: CORS headers are now added at the nginx layer so that
    # they are present on ALL responses -- including 502/503 error responses when
    # the Go BFF is unreachable. Previously, CORS headers were only emitted by the
    # Go application itself; when the proxy failed (503) the browser received an
    # opaque error with no CORS headers and could not read the error body.
    #
    # OPTIONS preflight for any /api/v1/* path is handled inside this block via
    # the `if ($request_method = OPTIONS)` guard, which short-circuits before
    # reaching the proxy_pass. This ensures preflight works for unknown routes.
    location /api/v1/ {
        # Handle OPTIONS preflight at the nginx layer -- no proxy needed.
        # Browsers send OPTIONS before cross-origin POST/PUT/DELETE and any
        # request with a custom header (e.g. Authorization). Without this,
        # an OPTIONS to an unhandled route would hit the Go BFF (or return 503
        # if Go is down) -- both without CORS headers -- causing the browser to
        # silently block the real request.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*"                               always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type"     always;
            add_header Access-Control-Max-Age       "86400"                           always;
            add_header Content-Length               0                                 always;
            add_header Content-Type                 "text/plain; charset=utf-8"       always;
            return 200;
        }

        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;

        # Strip upstream CORS headers before adding ours to prevent duplicates.
        # The Go BFF emits its own CORS headers; without these directives browsers
        # would see two Access-Control-Allow-Origin values and reject the response.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # CORS headers on all proxy responses, including error responses.
        # "always" ensures headers are sent on 4xx and 5xx responses too.
        add_header Access-Control-Allow-Origin  "*"                               always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type"     always;
    }

    # Health check endpoint (no rate limiting, no access log)
    location /health {
        proxy_pass       http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Extended health check used by staging-deploy.yml post-deploy verification
    location /healthz {
        proxy_pass       http://127.0.0.1:8080/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    # Catch-all: any path that does not match /api/v1/*, /health, /healthz,
    # or /.well-known/* returns a clean JSON 404 with CORS headers.
    #
    # Root cause of issue #1696: without this block, nginx had no fallback for
    # unknown paths. An unhandled request would either reach the Go BFF and
    # receive a 503 without CORS headers (Go framework fallback), or nginx itself
    # would return a 404 without CORS headers (when Go was unreachable).
    # In both cases the browser blocked the response due to missing CORS headers.
    location / {
        add_header Content-Type                 "application/json"                always;
        add_header Access-Control-Allow-Origin  "*"                               always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type"     always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age "86400" always;
            add_header Content-Length         0       always;
            return 200;
        }

        return 404 '{"error":"not_found","message":"Route not found"}';
    }

    # No static file serving -- ADR-008: API proxy only

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.vaultmtg.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.vaultmtg.app/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api.vaultmtg.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name api.vaultmtg.app;
    return 404; # managed by Certbot
}
