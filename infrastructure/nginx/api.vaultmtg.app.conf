# nginx server block for api.vaultmtg.app
# ADR-008: This EC2 nginx instance serves the BFF/API ONLY.
# No static frontend assets are served here.
# Frontend is served via CloudFront (vaultmtg-app-cdn stack).
#
# TLS managed by Certbot (Let's Encrypt). Lines marked "managed by Certbot"
# are written/updated automatically on renewal -- do not remove them.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    server_name api.vaultmtg.app;

    # ACME challenge passthrough for certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy - all traffic proxied to Go BFF on port 8080
    location /api/v1/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # Health check endpoint (no rate limiting, no access log)
    location /health {
        proxy_pass       http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    # No static file serving -- ADR-008: API proxy only

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.vaultmtg.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.vaultmtg.app/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api.vaultmtg.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name api.vaultmtg.app;
    return 404; # managed by Certbot
}
