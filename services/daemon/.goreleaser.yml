# .goreleaser.yml -- GoReleaser configuration for the MTGA Companion daemon.
#
# Targets:
#   - windows/amd64   -- single exe, no CGO (built here on ubuntu-latest)
#
# darwin (arm64 + amd64) is built separately in the `build-macos` CI job on a
# macos-latest runner with CGO_ENABLED=1 so the systray/Cocoa tray icon
# compiles in.  GoReleaser only handles Windows and the GitHub Release creation.
#
# GoReleaser open-source (free tier) only -- no Pro features used.
#
# Run locally (dry-run):
#   cd services/daemon && goreleaser release --snapshot --clean
#
# ---------------------------------------------------------------------------
# CODE SIGNING -- ACTIVE (both Apple and Azure configured as of 2026-05-10)
# ---------------------------------------------------------------------------
# ADR-011 Section 5 documents the full signing strategy. Summary:
#
# macOS -- Apple Developer ID notarization (ticket #1648)
# -------------------------------------------------------
# Status: ACTIVE. Credentials configured in SSM and GitHub Actions secrets.
# Identity validation: approved 2026-05-10.
#
# How it works:
#   1. build    -- GoReleaser produces universal binary (lipo darwin/amd64 + arm64)
#   2. sign     -- codesign --options runtime --sign "Developer ID Application: <TEAM_ID>"
#   3. pkg      -- pkgbuild --sign "Developer ID Installer: <TEAM_ID>"
#   4. notarize -- xcrun notarytool submit <.dmg> --wait
#   5. staple   -- xcrun stapler staple <.dmg>
#   6. publish  -- GitHub Release via goreleaser-action
#
# CI implementation: .github/workflows/daemon-release.yml job sign-macos.
# The sign-macos job is live and tag-guarded (refs/tags/daemon/v*).
# It requires these GitHub Actions secrets:
#   APPLE_TEAM_ID                        -- 10-char team identifier from Apple account
#   APPLE_DEVELOPER_CERTIFICATE          -- base64-encoded Developer ID Application .p12
#   APPLE_DEVELOPER_CERTIFICATE_PASSWORD -- passphrase for the .p12
#   APPLE_INSTALLER_CERTIFICATE          -- base64-encoded Developer ID Installer .p12
#   APPLE_INSTALLER_CERTIFICATE_PASSWORD -- passphrase for the installer .p12
#   APPLE_NOTARIZATION_APPLE_ID          -- Apple ID email used for notarytool
#   APPLE_NOTARIZATION_PASSWORD          -- app-specific password for notarytool
#                                           (generated at appleid.apple.com)
#
# SSM credential paths (active):
#   /vaultmtg/prod/apple-team-id
#   /vaultmtg/prod/apple-notarization-apple-id
#   /vaultmtg/prod/apple-notarization-password    (SecureString)
#   /vaultmtg/prod/apple-developer-certificate    (SecureString, base64 .p12)
#   /vaultmtg/prod/apple-developer-certificate-password (SecureString)
#   /vaultmtg/prod/apple-installer-certificate    (SecureString, base64 .p12)
#   /vaultmtg/prod/apple-installer-certificate-password (SecureString)
#
# These SSM params are loaded into GitHub Actions secrets.
# Operational runbook: docs/runbooks/macos-notarization.md
#
# Windows -- Azure Trusted Signing (ticket #1649)
# ------------------------------------------------
# Status: ACTIVE. Azure identity validation approved 2026-05-10.
#         Account active ($9.99/mo). Credentials configured in SSM and
#         GitHub Actions secrets.
#
# How it works:
#   1. build    -- GoReleaser produces vaultmtg-daemon-windows-amd64.exe
#   2. publish  -- GitHub Release via goreleaser-action (unsigned .exe uploaded)
#   3. sign     -- daemon-release.yml sign-windows job (windows-latest runner)
#                  downloads the .exe, signs via azure/trusted-signing-action,
#                  asserts Get-AuthenticodeSignature Valid, re-uploads signed .exe
#
# Note: signing runs in a separate sign-windows job on windows-latest because
# azure/trusted-signing-action only supports Windows runners. It cannot run in
# the goreleaser job (ubuntu-latest).
#
# GitHub Actions secrets (active):
#   AZURE_TENANT_ID               -- Azure AD tenant ID
#   AZURE_CLIENT_ID               -- Service principal (app registration) client ID
#   AZURE_CLIENT_SECRET           -- Service principal secret (SecureString in SSM)
#   AZURE_TRUSTED_SIGNING_ACCOUNT -- Trusted Signing account name
#   AZURE_CERTIFICATE_PROFILE     -- Certificate profile name
#
# SSM credential paths (active):
#   /vaultmtg/prod/azure-tenant-id
#   /vaultmtg/prod/azure-client-id
#   /vaultmtg/prod/azure-client-secret            (SecureString)
#   /vaultmtg/prod/azure-trusted-signing-account
#   /vaultmtg/prod/azure-certificate-profile
#
# Budget summary (ADR-011, budget approved 2026-05-10):
#   Apple Developer Program: $99/yr
#   Azure Trusted Signing:   $9.99/mo (~$120/yr)
#   Total GA signing cost:   ~$219/yr
#
# Full Azure signing runbook: docs/runbooks/windows-trusted-signing.md
# ---------------------------------------------------------------------------

version: 2

project_name: vaultmtg-daemon

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
builds:
  - id: daemon
    # dir sets the working directory for the go build command.
    # GoReleaser is invoked from the repo root (--config services/daemon/.goreleaser.yml)
    # so main paths must be relative to the repo root, or dir must be set so that
    # ./cmd/daemon resolves correctly to services/daemon/cmd/daemon.
    dir: services/daemon
    main: ./cmd/daemon
    binary: vaultmtg-daemon
    env:
      # CGO_ENABLED=1 so the real tray.go (//go:build cgo) compiles in and the
      # Windows systray icon is present. CGO was previously 0 here (the macOS
      # tray stub regression introduced in commit 39e53fa7, 2026-05-09). Fixed
      # by vault-mtg-tickets#199 — mirrors the macOS fix in PR #2745.
      # CC must point at the mingw-w64 cross-compiler installed in the goreleaser
      # job's apt-get step (gcc-mingw-w64-x86-64).
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - GONOSUMDB=github.com/RdHamilton/vault-mtg
      - GOPRIVATE=github.com/RdHamilton/vault-mtg
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      # main.Version embeds the release version for `mtga-daemon -version` output.
      # main.DefaultCloudAPIURL is the build-time default cloud_api_url written
      # to daemon.json by handleMissingConfig when no env var is supplied (#2560).
      # The release workflow picks the env value:
      #   stable tags (daemon/v0.3.1)      -> https://api.vaultmtg.app/api/v1
      #   pre-release  (-rc/-alpha/-beta/-pre) -> https://staging-api.vaultmtg.app/api/v1
      # Local `goreleaser release --snapshot` uses whatever DEFAULT_CLOUD_API_URL
      # is in the env; if unset, goreleaser substitutes an empty string and the
      # binary falls back to the package-level localhost default.
      # main.DefaultSentryDSN is the build-time daemon Sentry DSN (#1832).
      # Resolved by daemon-release.yml: production tags use the prod DSN, pre-
      # release tags use the staging DSN, snapshot builds get an empty value
      # which leaves Sentry disabled at runtime.
      - -s -w -X main.Version={{ .Env.PLAIN_VERSION }} -X main.DefaultCloudAPIURL={{ .Env.DEFAULT_CLOUD_API_URL }} -X main.DefaultSentryDSN={{ .Env.DEFAULT_SENTRY_DSN }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    # Windows NSIS installer -- compiled after the Windows amd64 binary is built.
    # makensis is available on ubuntu runners via apt; skipped in snapshot mode.
    # /DCLOUD_API_URL bakes the BFF endpoint into the installer so the env-mismatch
    # guard in installer.nsi can detect cross-env reinstalls (#194).
    hooks:
      pre:
        # Embed the VaultMTG app icon into the Windows .exe (#307).
        # goversioninfo is a pure-Go preprocessor: it reads versioninfo.json and
        # produces a COFF resource file (resource.syso) next to package main.  The
        # Go linker auto-links any *.syso in the main package directory, so the
        # .ico becomes the Explorer/taskbar icon of vaultmtg-daemon.exe.  No CGO
        # is involved — this works regardless of the CGO_ENABLED setting above.
        #
        # TARGET-scoped (builds[].hooks.pre), NOT a top-level `before` hook:
        # GoReleaser FREE `before` hooks are GLOBAL and run once for all targets;
        # builds[].hooks honor the {{ .Os }} template so the .syso is generated
        # only for the windows target.  A .syso for the wrong GOOS would be a
        # link error on darwin (the darwin binary is built by build-macos, not
        # GoReleaser, so this is belt-and-suspenders).
        - cmd: >
            bash -c '[ "${TARGET_GOOS}" != "windows" ] && exit 0;
            command -v goversioninfo >/dev/null 2>&1 || {
            echo "goversioninfo not installed - skipping .exe icon embed"; exit 0; };
            goversioninfo
            -icon services/daemon/install/icons/vaultmtg.ico
            -o services/daemon/cmd/daemon/resource.syso
            services/daemon/cmd/daemon/versioninfo.json'
          env:
            - TARGET_GOOS={{ .Os }}
      post:
        - cmd: >
            bash -c '[ "${IS_SNAPSHOT}" = "true" ] && exit 0;
            [ "${TARGET_GOOS}" != "windows" ] && exit 0;
            command -v makensis >/dev/null 2>&1 || exit 0;
            makensis
            -DVERSION={{ .Env.PLAIN_VERSION }}
            "-DBINARY_PATH={{ .Path }}"
            "-DCLOUD_API_URL={{ .Env.DEFAULT_CLOUD_API_URL }}"
            services/daemon/install/windows/nsis/installer.nsi'
          env:
            - IS_SNAPSHOT={{ .IsSnapshot }}
            - TARGET_GOOS={{ .Os }}


# ---------------------------------------------------------------------------
# Archives / packaging
# ---------------------------------------------------------------------------
archives:
  # Windows amd64: ship the bare exe so the release also has a raw binary.
  # The NSIS .exe installer is also built by the build hook and attached.
  # darwin archives are produced and uploaded by the build-macos + sign-macos
  # CI jobs (macos-latest runner), not by GoReleaser.
  - id: windows-amd64
    ids:
      - daemon
    formats:
      - binary
    name_template: "vaultmtg-daemon-windows-amd64"
    files:
      - none*


# ---------------------------------------------------------------------------
# Checksums
# ---------------------------------------------------------------------------
checksum:
  name_template: sha256sums.txt
  algorithm: sha256

# ---------------------------------------------------------------------------
# GitHub Release
# ---------------------------------------------------------------------------
release:
  github:
    owner: RdHamilton
    name: vault-mtg
  # Tag handling note (ADR-023 daemon/v* namespacing on free-tier GoReleaser):
  #
  # GoReleaser publishes the GitHub Release at `ctx.Git.CurrentTag`, which is
  # sourced from the `GORELEASER_CURRENT_TAG` env var. That value MUST be a
  # parseable semver (e.g. `v0.3.2-rc1`) or the internal semver pipe fails with
  # `failed to parse tag '<tag>' as semver` (see workflow run 26437135668).
  #
  # We cannot use `release.tag: "{{ .Env.PREFIXED_TAG }}"` to restore the
  # `daemon/v*` prefix on publish: the `release.tag` field is GoReleaser Pro-
  # only and is unmarshal-rejected by free-tier GoReleaser (verified against
  # v2.15.4 and v2.16.0 source -- `pkg/config/config.go` Release struct has no
  # `Tag` field, and the private-monorepo-public-release cookbook explicitly
  # notes "On GoReleaser Pro, {{.Tag}} represents the tag without the prefix").
  #
  # Free-tier path: GoReleaser publishes at the bare semver tag (e.g.
  # `v0.3.2-rc1`); daemon-release.yml then PATCHes the GitHub Release to rename
  # `tag_name` to the prefixed `daemon/v*` form, atomically restoring the
  # ADR-023 namespacing guarantee. The bare-`v*` tag is never pushed to the
  # remote (the `git tag -f` in the workflow is local-only), so no on-remote
  # squat of the application release namespace ever occurs.
  # Tag format: daemon/v0.3.1 -- strip the "daemon/" prefix for the release name.
  name_template: "Daemon {{ .Tag }}"
  draft: false
  prerelease: auto
  extra_files:
    # Windows NSIS .exe produced by the builds post hook.
    # Written to repo root by makensis (OutFile uses relative path from invocation dir).
    - glob: "vaultmtg-daemon-setup-*.exe"
    # NOTE: macOS .pkg/.dmg are NOT listed here.
    # They are built and uploaded by the sign-macos job (macos-latest runner) via
    # 'gh release upload' after notarization. GoReleaser runs on ubuntu-latest and
    # cannot build or find the macOS artifacts.

# ---------------------------------------------------------------------------
# Snapshot (local dev / CI dry-run)
# ---------------------------------------------------------------------------
snapshot:
  version_template: "{{ .Tag }}-dev"

# ---------------------------------------------------------------------------
# Changelog (generated by GoReleaser from git log)
# ---------------------------------------------------------------------------
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch
