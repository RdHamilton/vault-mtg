# .goreleaser.yml — GoReleaser configuration for the MTGA Companion daemon.
#
# Targets:
#   - darwin/amd64  }
#   - darwin/arm64  } merged by lipo into a darwin universal binary
#   - windows/amd64   — single exe, no CGO
#
# GoReleaser open-source (free tier) only — no Pro features used.
#
# Run locally (dry-run):
#   cd services/daemon && goreleaser release --snapshot --clean

version: 2

project_name: vaultmtg-daemon

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
builds:
  - id: daemon
    main: ./cmd/daemon
    binary: vaultmtg-daemon
    env:
      - CGO_ENABLED=0
      - GONOSUMDB=github.com/RdHamilton/MTGA-Companion
      - GOPRIVATE=github.com/RdHamilton/MTGA-Companion
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Exclude darwin/arm64 from the individual windows-style naming — arm64
    # only appears in the darwin pair that lipo merges into a universal binary.
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

# ---------------------------------------------------------------------------
# Universal binary (darwin arm64 + amd64 → single universal binary via lipo)
# ---------------------------------------------------------------------------
universal_binaries:
  - id: daemon-universal
    ids:
      - daemon
    name_template: vaultmtg-daemon
    replace: true

# ---------------------------------------------------------------------------
# Archives / packaging
# ---------------------------------------------------------------------------
archives:
  # macOS: ship the universal binary as a bare binary (no archive).
  # The .pkg/.dmg are built by the after hook (see below) and attached as
  # extra_files on the GitHub Release.
  - id: darwin-universal
    ids:
      - daemon-universal
    formats:
      - binary
    name_template: "vaultmtg-daemon-darwin-universal"
    allow_different_binary_count: true

  # Windows amd64: ship the bare exe so the release also has a raw binary.
  # The NSIS .exe installer is also built by the after hook and attached.
  - id: windows-amd64
    builds:
      - daemon
    format: binary
    name_template: "vaultmtg-daemon-windows-amd64"
    files:
      - none*

# ---------------------------------------------------------------------------
# Post-build hooks — build macOS .pkg/.dmg and Windows NSIS .exe
#
# These run after GoReleaser has compiled and merged the binaries.
# The CI runner (daemon-release.yml) is responsible for having the required
# tools installed (hdiutil on macOS runners, makensis on ubuntu runners).
# ---------------------------------------------------------------------------
after:
  hooks:
    # macOS: build the .pkg postinstall-based installer and wrap in a .dmg.
    # Runs only on macOS runners (hdiutil and pkgbuild are macOS-only).
    - cmd: bash install/macos/pkg/build-pkg.sh
      env:
        - BINARY_PATH={{ .Artifacts.FindByID "daemon-universal" }}
        - VERSION={{ .Version }}
        # TEAM_ID is set in CI via secrets; empty locally = unsigned .pkg.
        - TEAM_ID={{ if .Env.APPLE_TEAM_ID }}{{ .Env.APPLE_TEAM_ID }}{{ end }}
      dir: "{{ .Env.GITHUB_WORKSPACE }}/services/daemon"
      # Skip on non-darwin platforms and in snapshot mode.
      if: '{{ and (eq .Runtime.Goos "darwin") (not .IsSnapshot) }}'
    # Windows: compile the NSIS .exe installer.
    # Runs on ubuntu runners (makensis is cross-platform via apt).
    - cmd: >
        makensis
        /DVERSION={{ .Version }}
        /DBINARY_PATH=dist/vaultmtg-daemon-windows-amd64.exe
        install/windows/nsis/installer.nsi
      dir: "{{ .Env.GITHUB_WORKSPACE }}/services/daemon"
      if: '{{ not .IsSnapshot }}'

# ---------------------------------------------------------------------------
# Checksums
# ---------------------------------------------------------------------------
checksum:
  name_template: sha256sums.txt
  algorithm: sha256

# ---------------------------------------------------------------------------
# GitHub Release
# ---------------------------------------------------------------------------
release:
  github:
    owner: RdHamilton
    name: MTGA-Companion
  # Tag format: daemon/v0.3.1 — strip the "daemon/" prefix for the release name.
  name_template: "Daemon {{ .Tag }}"
  draft: false
  prerelease: auto
  extra_files:
    # macOS .pkg/.dmg produced by the after hook.
    - glob: "services/daemon/vaultmtg-daemon-darwin-universal.pkg"
    - glob: "services/daemon/vaultmtg-daemon-darwin-universal.dmg"
    # Windows NSIS .exe produced by the after hook.
    - glob: "services/daemon/vaultmtg-daemon-setup-*.exe"

# ---------------------------------------------------------------------------
# Snapshot (local dev / CI dry-run)
# ---------------------------------------------------------------------------
snapshot:
  version_template: "{{ .Tag }}-dev"

# ---------------------------------------------------------------------------
# Changelog (generated by GoReleaser from git log)
# ---------------------------------------------------------------------------
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch
