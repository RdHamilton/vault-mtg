# Composite action — single source of truth for the BFF build command.
#
# Every workflow that builds the BFF (ci.yml, e2e-smoke.yml, deploy-bff.yml)
# delegates here so the build target, env vars, and output path are defined
# in exactly one place and cannot drift between workflows.
#
# Post-mortem action A6 — DRY the BFF build (#2175).

name: Build BFF binary
description: >
  Builds the VaultMTG BFF service for a given OS/arch and writes the binary to
  the path specified by the `output-path` input. Requires Go to be installed in
  the caller (setup-go must run before this action).

inputs:
  goos:
    description: 'Target OS (GOOS). Defaults to the runner OS (empty string).'
    required: false
    default: ''
  goarch:
    description: 'Target CPU architecture (GOARCH). Defaults to the runner arch (empty string).'
    required: false
    default: ''
  output-path:
    description: 'Path (relative to repo root) where the compiled binary is written, e.g. bin/mtga-bff.'
    required: true
  version:
    description: >
      Build-time version string injected into main.version via -ldflags.
      Callers should pass the app tag with the "app/v" prefix stripped
      (e.g. "0.3.3"). Defaults to "dev" when not provided.
    required: false
    default: 'dev'

runs:
  using: composite
  steps:
    - name: Resolve BFF version from git tag
      id: resolve-version
      shell: bash
      run: |
        if [ "${{ inputs.version }}" != "dev" ]; then
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
        else
          RAW=$(git describe --tags --match 'app/v*' --abbrev=0 2>/dev/null || true)
          if [ -n "$RAW" ]; then
            echo "version=${RAW#app/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi
        fi
    - name: Build BFF binary
      shell: bash
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg
        GOPRIVATE: github.com/RdHamilton/vault-mtg
        GOOS: ${{ inputs.goos }}
        GOARCH: ${{ inputs.goarch }}
      run: |
        cd services/bff
        go build -ldflags="-X main.version=${{ steps.resolve-version.outputs.version }}" -o "../../${{ inputs.output-path }}" ./cmd
