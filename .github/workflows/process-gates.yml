name: Process Gates

# ---------------------------------------------------------------------------
# Ticket #2342 — P-06: Convert prose rules to enforced CI/hook gates.
#
# This workflow enforces the process rules that are not already covered by
# ci.yml.  Gates already in ci.yml (gowork-replace-lint, go-lint/go-vet,
# go-lint/gofumpt, frontend-component-tests/tsc) are not duplicated here.
#
# Rule: RULE-INFRA-01 — gates marked continue-on-error: true have pre-existing
# violations and will become hard-fail once those violations are cleaned up.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  # ---------------------------------------------------------------------------
  # Gate #1 — Secrets scan
  # Grep for common secret patterns in source files.
  # ---------------------------------------------------------------------------
  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Scan for secret patterns
        run: |
          echo "Scanning for common secret patterns..."
          FOUND=0

          # Scan source files (not docs, not test fixtures with fake keys)
          if grep -rn \
            --include="*.go" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.yml" \
            --include="*.yaml" \
            --include="*.json" \
            --include="*.sh" \
            -E "(sk_live_[a-zA-Z0-9]{20,}|sk_test_[a-zA-Z0-9]{20,}|AKIA[A-Z0-9]{16}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY|ghp_[A-Za-z0-9]{36,}|[MNO][A-Za-z0-9]{23}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}|vercel_[a-zA-Z0-9]{24,})" \
            . \
            --exclude-dir=.git \
            --exclude="corpus-lint.sh" 2>/dev/null; then
            echo ""
            echo "ERROR: Possible secrets found in committed files above."
            echo "Remove secrets from the repo and rotate any exposed credentials."
            echo ""
            FOUND=1
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "Secrets scan: PASS — no secret patterns found in source files."
          fi

  # ---------------------------------------------------------------------------
  # Gate #4 — npm run lint (ESLint on frontend/)
  # ci.yml runs tsc and vitest on frontend changes; ESLint is not run.
  # This job adds the missing lint gate.
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: Frontend lint (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint

  # ---------------------------------------------------------------------------
  # Gate #6 — Pre-Review Checklist presence check
  # Fails if the PR body does not contain "## Pre-Review Checklist".
  # Only runs on pull_request events (skip on push to main).
  # ---------------------------------------------------------------------------
  pr-checklist-gate:
    name: PR body — Pre-Review Checklist present
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: |
      github.event_name == 'pull_request' &&
      !startsWith(github.head_ref, 'chore/') &&
      !startsWith(github.head_ref, 'docs/') &&
      !startsWith(github.head_ref, 'fix/ci') &&
      !startsWith(github.head_ref, 'fix/infra') &&
      !startsWith(github.head_ref, 'fix/staging')

    steps:
      - name: Check for Pre-Review Checklist header
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -q "## Pre-Review Checklist"; then
            echo "Pre-Review Checklist header found. Gate: PASS"
          else
            echo "ERROR: PR body is missing the '## Pre-Review Checklist' section."
            echo ""
            echo "Add the following to your PR description and complete all items:"
            echo ""
            echo "  ## Pre-Review Checklist"
            echo "  - [ ] Staged files verified — only files belonging to this ticket are committed"
            echo "  - [ ] go vet ./... passes (or npx tsc --noEmit for frontend PRs)"
            echo "  - [ ] go test -race ./... passes (or npm run test:run for frontend PRs)"
            echo "  - [ ] gofumpt run on all changed .go files (Go PRs only)"
            echo "  - [ ] AC items from the ticket listed and each marked PASS/FAIL"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Gate #8 — Stale-repo grep
  # Fails if source files contain old repo references (MTGA-Companion,
  # mtga-companion-web) that should have been updated to vault-mtg.
  #
  # Excludes:
  #   - scripts/corpus-lint.sh (checks agents corpus, mentions old names for context)
  #   - .claude/ (legacy hook prompts with old paths — tracked separately)
  #   - docs/ (historical documents tracking the rename project)
  #   - services/daemon/internal/localapi/uninstall_windows.go and
  #     uninstall_windows_test.go — reference the legacy "MTGA-Companion-Daemon"
  #     scheduled task name verbatim; this is intentional legacy-migration
  #     cleanup code and must not be renamed.
  #   - .github/workflows/daemon-install-lifecycle.yml (intentional TODO comment
  #     for the migration scenario test).
  #
  # RULE-INFRA-01: continue-on-error: true until #2478 AC6 flips it to hard-fail.
  # As of #2478 AC3-AC5 all source/CI/daemon-config violations are resolved; the
  # only remaining matches are the intentionally-excluded legacy-task files above.
  # ---------------------------------------------------------------------------
  stale-repo-grep:
    name: Stale repo references (MTGA-Companion / mtga-companion-web)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Grep for stale repo references
        run: |
          echo "Checking for stale repo references (MTGA-Companion, mtga-companion-web)..."

          FOUND=$(grep -rn "MTGA-Companion\|mtga-companion-web" \
            --include="*.go" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.yml" \
            --include="*.yaml" \
            --include="*.json" \
            . \
            --exclude-dir=.git \
            --exclude-dir=docs \
            --exclude="corpus-lint.sh" \
            --exclude="process-gates.yml" \
            --exclude="uninstall_windows.go" \
            --exclude="uninstall_windows_test.go" \
            --exclude="daemon-install-lifecycle.yml" \
            --exclude-dir=".claude" \
            2>/dev/null || true)

          if [ -n "$FOUND" ]; then
            echo "$FOUND"
            echo ""
            echo "ERROR: Stale repo references found."
            echo "Replace 'MTGA-Companion' with 'vault-mtg' and 'mtga-companion-web'"
            echo "with 'vault-mtg-web' (or remove if no longer applicable)."
            echo ""
            echo "NOTE (RULE-INFRA-01): This gate is currently soft-fail (continue-on-error: true)."
            echo "Pre-existing violations exist in frontend/src/components/AboutDialog.tsx"
            echo "(GitHub URLs), .github/actions/build-bff (GONOSUMDB), and daemon files"
            echo "(legacy scheduled task migration code). Convert to hard-fail once resolved."
            exit 1
          else
            echo "Stale-repo grep: PASS — no stale references found in source files."
          fi
