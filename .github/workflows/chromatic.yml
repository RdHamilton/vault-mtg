name: Chromatic

# Pull requests: always run so the 'Chromatic Visual Tests' check is always
# present as a required status. Path filtering is done inside the job via the
# 'detect-changes' step -- if no frontend files changed the job exits early
# (green) without running the expensive Storybook build or consuming Chromatic quota.
#
# Push to main: still path-filtered to avoid running the full build on every
# non-frontend commit merged to main (post-merge snapshots are less critical).
on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/.storybook/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/chromatic.yml'
  pull_request:
    branches: [main]
    # No path filter -- the job must always run on PRs so the required status
    # check is always emitted (even when zero frontend files changed).
    #
    # 'labeled'/'unlabeled' are added on top of the default
    # opened/synchronize/reopened so that applying (or removing) the
    # 'brand-approved' label re-runs this workflow. That re-run is what flips
    # the required check from red to green for verified brand PRs (see the
    # 'Run Chromatic' step). Without these types, adding a label would NOT
    # re-trigger the check and the auto-accept path would never fire.
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chromatic:
    name: Chromatic Visual Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Chromatic requires full git history to diff against baseline commits.
          fetch-depth: 0

      - name: Detect frontend changes
        id: changes
        run: |
          # On pull_request events, diff against the base branch.
          # On push events (main), diff against the previous commit.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^frontend/(src|\.storybook|package\.json|package-lock\.json)'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no frontend changes)
        if: steps.changes.outputs.frontend_changed == 'false'
        run: echo "No frontend files changed -- skipping Storybook build and Chromatic upload."

      - name: Set up Node.js
        if: steps.changes.outputs.frontend_changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.frontend_changed == 'true'
        run: npm ci
        working-directory: frontend

      - name: Build Storybook
        if: steps.changes.outputs.frontend_changed == 'true'
        run: npm run build-storybook
        working-directory: frontend

      - name: Check for Chromatic token
        if: steps.changes.outputs.frontend_changed == 'true'
        id: token_check
        run: |
          if [ -z "${{ secrets.CHROMATIC_PROJECT_TOKEN }}" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CHROMATIC_PROJECT_TOKEN secret is not set. Skipping Chromatic upload."
            echo "To provision: go to https://www.chromatic.com, create a project, then add the token"
            echo "as a GitHub Actions secret at https://github.com/RdHamilton/vault-mtg/settings/secrets/actions"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Chromatic
        # This step is the visual regression gate. It fails CI when unreviewed visual
        # changes are detected, forcing a review before the status check passes.
        #
        # Three cases, in order:
        #
        # 1. Push to main: --auto-accept-changes is passed so that merged snapshots
        #    automatically become the new baseline. This is the standard Chromatic
        #    pattern for keeping main in sync as the reference baseline. This path is
        #    selected purely on github.event_name == 'push', so a label NEVER affects
        #    a main push.
        #
        # 2. Pull request carrying the 'brand-approved' label: --auto-accept-changes is
        #    passed so the build accepts ALL detected visual changes and exits 0,
        #    turning the required check GREEN without anyone touching the Chromatic
        #    dashboard. This is for Epic B brand PRs, which produce intentional visual
        #    diffs from applying the frozen design-system tokens
        #    (frontend/src/index.css <- "Ray Hamilton Engineering Design System/
        #    colors_and_type.css"). The safety here is CODE REVIEW, not human visual
        #    inspection on the dashboard.
        #
        #    IMPORTANT: --auto-accept-changes accepts EVERY visual change in the build.
        #    The 'brand-approved' label therefore MUST mean "a reviewer has verified
        #    that every visual change in this PR is an intentional, design-system-
        #    matching brand change." Never apply the label blind. Only a reviewer who
        #    has diffed the PR's CSS against the frozen colors_and_type.css applies it.
        #    See docs/engineering/reference/storybook-spike.md ("brand-approved
        #    auto-accept") for the contract.
        #
        # 3. Any other pull request (no 'brand-approved' label): --auto-accept-changes
        #    is NOT passed, so any visual difference detected against the main baseline
        #    keeps the check red until the changes are accepted on the Chromatic
        #    dashboard -- unchanged from prior behavior.
        #
        # The label is read from the pull_request event payload. On push events
        # github.event.pull_request is null, so the contains() check is false and the
        # auto-accept path is unreachable outside of a labeled PR.
        #
        # REQUIRES: CHROMATIC_PROJECT_TOKEN secret must be set in GitHub Actions secrets.
        # To provision:
        #   1. Create a project at https://www.chromatic.com
        #      (see docs/engineering/reference/storybook-spike.md)
        #   2. Copy the project token from Project Settings > Manage > Token
        #   3. Add it as a GitHub Actions secret named CHROMATIC_PROJECT_TOKEN
        #      at https://github.com/RdHamilton/vault-mtg/settings/secrets/actions
        if: >
          steps.changes.outputs.frontend_changed == 'true' &&
          steps.token_check.outputs.has_token == 'true'
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Resolved by the Actions expression engine, not shell. 'true' only when a
          # PR event carries the 'brand-approved' label; '' (falsey) on push or
          # unlabeled PRs.
          BRAND_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'brand-approved') }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Case 1: main push -- refresh the baseline.
            npx chromatic --storybook-build-dir=storybook-static --only-changed --auto-accept-changes
          elif [ "$BRAND_APPROVED" = "true" ]; then
            # Case 2: reviewer-verified brand PR -- accept the intentional diffs.
            echo "brand-approved label present: auto-accepting reviewer-verified brand visual changes."
            npx chromatic --storybook-build-dir=storybook-static --only-changed --auto-accept-changes
          else
            # Case 3: ordinary PR -- strict, requires acceptance before the check passes.
            npx chromatic --storybook-build-dir=storybook-static --only-changed
          fi
        working-directory: frontend
