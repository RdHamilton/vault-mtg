name: Integration Tests

# Triggered on pull requests that touch BFF or contract code so projection
# regressions are caught per-PR (ADR-042 Layer 3a). Also runnable manually
# and callable from environment-promotion workflows.
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    paths:
      - 'services/bff/**'
      - 'services/contract/**'

permissions:
  contents: read

jobs:
  bff-integration-tests:
    name: BFF Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mtga
          POSTGRES_PASSWORD: mtga
          POSTGRES_DB: mtga_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Download dependencies
      working-directory: services/bff
      env:
        GONOSUMDB: github.com/RdHamilton/vault-mtg
        GOPRIVATE: github.com/RdHamilton/vault-mtg
      run: go mod download

    - name: Run BFF integration tests
      working-directory: services/bff
      env:
        DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_test?sslmode=disable
        INTEGRATION_TEST: "true"
        GONOSUMDB: github.com/RdHamilton/vault-mtg
        GOPRIVATE: github.com/RdHamilton/vault-mtg
      run: go test -v -run Integration -coverprofile=coverage-integration.out -covermode=atomic ./...

    - name: Run Layer 3a projection integration tests
      # RULE-INFRA-01 / ADR-042: advisory gate — continue-on-error at step
      # level only.  Checkout, Go setup, and dep-download above remain
      # hard-required.  Ticket #249 flips this step to hard-fail after two
      # green runs on main.
      continue-on-error: true
      working-directory: services/bff
      env:
        DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_test?sslmode=disable
        GONOSUMDB: github.com/RdHamilton/vault-mtg
        GOPRIVATE: github.com/RdHamilton/vault-mtg
      run: go test -v -tags integration -run TestProjectionIntegration -coverprofile=coverage-integration-proj.out -covermode=atomic ./...

    - name: Upload integration coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./services/bff/coverage-integration.out
        flags: bff-integration
        fail_ci_if_error: false
