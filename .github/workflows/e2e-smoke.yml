name: E2E Smoke Tests

on:
  workflow_dispatch:
  # Called by release.yml as the Tier 3 release gate
  workflow_call:

permissions:
  contents: read

jobs:
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mtga
          POSTGRES_PASSWORD: mtga
          POSTGRES_DB: mtga_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: go.sum

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Install Playwright browsers
      run: |
        cd frontend
        npx playwright install chromium --with-deps

    - name: Build API server
      run: go build -o bin/apiserver ./cmd/apiserver

    - name: Run E2E smoke tests
      run: |
        cd frontend
        npm run test:e2e:smoke
      env:
        CI: true
        DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_e2e?sslmode=disable

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-smoke-results
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 7
