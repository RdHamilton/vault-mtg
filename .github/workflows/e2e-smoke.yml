name: E2E Smoke Tests

on:
  workflow_dispatch:
  # Called by release.yml as the Tier 3 release gate
  workflow_call:
    inputs:
      # When called from ci.yml (build-bff-for-e2e job), the caller passes the
      # artifact name so we can skip the ~3-4 min source build.  If omitted
      # (manual trigger, release.yml, etc.) we fall back to building from source.
      bff_artifact_name:
        description: 'Name of a pre-built BFF binary artifact (upload-artifact name)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mtga
          POSTGRES_PASSWORD: mtga
          POSTGRES_DB: mtga_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    # -----------------------------------------------------------------------
    # BFF binary — fast path: download pre-built artifact from ci.yml
    # -----------------------------------------------------------------------
    - name: Download pre-built BFF artifact
      if: inputs.bff_artifact_name != ''
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.bff_artifact_name }}
        path: bin

    - name: Make pre-built BFF binary executable
      if: inputs.bff_artifact_name != ''
      run: chmod +x bin/mtga-bff

    # -----------------------------------------------------------------------
    # BFF binary — slow path: build from source (standalone / release trigger)
    # -----------------------------------------------------------------------
    - name: Set up Go (source build only)
      if: inputs.bff_artifact_name == ''
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: services/bff/go.sum

    - name: Build API server (source build only)
      if: inputs.bff_artifact_name == ''
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        cd services/bff
        go build -o ../../bin/mtga-bff ./cmd/main.go

    # -----------------------------------------------------------------------
    # Frontend / Playwright setup (always required)
    # -----------------------------------------------------------------------
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        cd frontend
        npx playwright install chromium --with-deps

    - name: Run E2E smoke tests
      run: |
        cd frontend
        npm run test:e2e:smoke
      env:
        CI: true
        # RULE-INFRA-03: Every CI job that starts the BFF MUST explicitly set MTGA_ENV.
        # Relying on config.Load() defaults is forbidden — the default is "production"
        # which is always wrong in CI. See services/bff/CI_ENV_CONTRACT.md. (#1668)
        MTGA_ENV: development
        DATABASE_URL: postgres://mtga:mtga@localhost:5432/mtga_e2e?sslmode=disable
        CLERK_SECRET_KEY: ${{ secrets.CLERK_STAGING_SECRET_KEY }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-smoke-results
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 7
