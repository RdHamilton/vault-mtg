name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      skip_e2e:
        description: 'Skip E2E smoke tests (emergency releases only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  # Allow other workflows to call this as a reusable workflow
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      prerelease:
        required: false
        default: 'false'
        type: string
      skip_e2e:
        required: false
        default: 'false'
        type: string

permissions:
  contents: write
  id-token: write  # required for OIDC-based AWS auth in deploy job

# ---------------------------------------------------------------------------
# Tier 3 — E2E smoke gate before release (release workflow only)
# Tier 2 — Integration gate after E2E smoke, before release artifact
# ---------------------------------------------------------------------------

jobs:
  # Run E2E smoke tests before cutting the release artifact.
  # Skippable via input for emergency hotfix releases only.
  e2e-smoke-gate:
    name: E2E Smoke Gate
    uses: ./.github/workflows/e2e-smoke.yml
    if: inputs.skip_e2e != 'true'

  # Run BFF integration tests after E2E smoke passes.
  # Blocks the release if any integration test fails.
  integration-gate:
    name: Integration Gate
    needs: [e2e-smoke-gate]
    if: always() && (needs.e2e-smoke-gate.result == 'success' || needs.e2e-smoke-gate.result == 'skipped')
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  release:
    needs: [e2e-smoke-gate, integration-gate]
    # Run if smoke passed (or skipped) AND integration tests passed
    if: always() && (needs.e2e-smoke-gate.result == 'success' || needs.e2e-smoke-gate.result == 'skipped') && needs.integration-gate.result == 'success'
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Create and push tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ inputs.tag }}
        git push origin ${{ inputs.tag }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build for multiple platforms
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        GOOS=linux   GOARCH=amd64 go build -v -o bin/mtga-companion-linux-amd64   ./cmd/mtga-companion
        GOOS=linux   GOARCH=arm64 go build -v -o bin/mtga-companion-linux-arm64   ./cmd/mtga-companion
        GOOS=darwin  GOARCH=amd64 go build -v -o bin/mtga-companion-darwin-amd64  ./cmd/mtga-companion
        GOOS=darwin  GOARCH=arm64 go build -v -o bin/mtga-companion-darwin-arm64  ./cmd/mtga-companion
        GOOS=windows GOARCH=amd64 go build -v -o bin/mtga-companion-windows-amd64.exe ./cmd/mtga-companion
        GOOS=windows GOARCH=arm64 go build -v -o bin/mtga-companion-windows-arm64.exe ./cmd/mtga-companion

    - name: Generate changelog
      run: |
        echo "## What's Changed" > changelog.md
        git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"* %s (%h)" >> changelog.md || echo "* Initial release" >> changelog.md
        echo "" >> changelog.md
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo 'v0.0.0')...${{ inputs.tag }}" >> changelog.md

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ inputs.tag }}
        files: |
          bin/mtga-companion-linux-amd64
          bin/mtga-companion-linux-arm64
          bin/mtga-companion-darwin-amd64
          bin/mtga-companion-darwin-arm64
          bin/mtga-companion-windows-amd64.exe
          bin/mtga-companion-windows-arm64.exe
        body_path: changelog.md
        draft: false
        prerelease: ${{ inputs.prerelease == 'true' }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy BFF to EC2
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && needs.release.result == 'success'
    environment: production
    concurrency:
      group: bff-prod-deploy
      cancel-in-progress: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build BFF for linux/amd64
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        cd services/bff
        GOOS=linux GOARCH=amd64 go build -o mtga-bff ./cmd/main.go

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        aws-region: us-east-1

    - name: Upload binary to S3
      run: |
        aws s3 cp services/bff/mtga-bff \
          s3://${{ secrets.DEPLOY_BUCKET }}/releases/${{ github.sha }}/mtga-bff

    # Reads ALLOWED_ORIGINS from SSM Parameter Store (runner side) and writes it into
    # /etc/mtga-companion/env on the EC2 instance via SSM RunCommand.
    # The sed + grep pattern is idempotent: it replaces the line if the key already
    # exists, otherwise it appends it. The BFF service restart at the end of the
    # Deploy step picks up the updated value.
    #
    # PREREQUISITE: the SSM parameter /mtga-companion/production/ALLOWED_ORIGINS must
    # exist before this workflow runs. Create or update it with:
    #   aws ssm put-parameter \
    #     --name /mtga-companion/production/ALLOWED_ORIGINS \
    #     --value "https://app.vaultmtg.app,https://vaultmtg.app,https://www.vaultmtg.app" \
    #     --type String --overwrite --region us-east-1
    - name: Provision ALLOWED_ORIGINS on EC2
      run: |
        ALLOWED_ORIGINS=$(aws ssm get-parameter \
          --name /mtga-companion/production/ALLOWED_ORIGINS \
          --region us-east-1 \
          --query Parameter.Value \
          --output text)

        SHELL_CMD="mkdir -p /etc/mtga-companion && if grep -q '^ALLOWED_ORIGINS=' /etc/mtga-companion/env 2>/dev/null; then sed -i 's|^ALLOWED_ORIGINS=.*|ALLOWED_ORIGINS=${ALLOWED_ORIGINS}|' /etc/mtga-companion/env; else echo 'ALLOWED_ORIGINS=${ALLOWED_ORIGINS}' >> /etc/mtga-companion/env; fi"
        PARAMS=$(SHELL_CMD="$SHELL_CMD" python3 -c "import json, os; print('commands=' + json.dumps([os.environ['SHELL_CMD']]))")

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters "$PARAMS" \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "Provision SSM Command ID: $COMMAND_ID"

        for i in $(seq 1 18); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/18] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "ALLOWED_ORIGINS provisioned."
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Provision failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done


    # Fetches the RDS master credential from Secrets Manager ON the EC2 instance
    # so the plaintext password never touches the workflow runner or GitHub logs.
    # The instance IAM role must have secretsmanager:GetSecretValue on the secret ARN
    # (already granted via the EC2 CloudFormation stack).
    # The DATABASE_URL is built with URL-encoded password to handle special characters.
    #
    # PREREQUISITE: /mtga-companion/production/db-secret-arn SSM parameter must exist:
    #   aws ssm put-parameter \
    #     --name /mtga-companion/production/db-secret-arn \
    #     --value "<RDS secret ARN from rds stack output DBSecretArn>" \
    #     --type String --region us-east-1
    - name: Provision DATABASE_URL on EC2
      run: |
        DB_SECRET_ARN=$(aws ssm get-parameter \
          --name /mtga-companion/production/db-secret-arn \
          --region us-east-1 \
          --query Parameter.Value \
          --output text)

        DB_ENDPOINT=$(aws ssm get-parameter \
          --name /mtga-companion/production/db-endpoint \
          --region us-east-1 \
          --query Parameter.Value \
          --output text)

        DB_NAME=$(aws ssm get-parameter \
          --name /mtga-companion/production/db-name \
          --region us-east-1 \
          --query Parameter.Value \
          --output text)

        SHELL_CMD="SECRET=\$(aws secretsmanager get-secret-value --secret-id ${DB_SECRET_ARN} --region us-east-1 --query SecretString --output text) && DB_USER=\$(echo \"\$SECRET\" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d[\"username\"])') && DB_PASS=\$(echo \"\$SECRET\" | python3 -c 'import sys,json,urllib.parse; d=json.load(sys.stdin); print(urllib.parse.quote(d[\"password\"], safe=\"\"))') && DATABASE_URL=\"postgres://\${DB_USER}:\${DB_PASS}@${DB_ENDPOINT}:5432/${DB_NAME}\" && mkdir -p /etc/mtga-companion && if grep -q '^DATABASE_URL=' /etc/mtga-companion/env 2>/dev/null; then sed -i \"s|^DATABASE_URL=.*|DATABASE_URL=\${DATABASE_URL}|\" /etc/mtga-companion/env; else echo \"DATABASE_URL=\${DATABASE_URL}\" >> /etc/mtga-companion/env; fi && chmod 600 /etc/mtga-companion/env"
        PARAMS=$(SHELL_CMD="$SHELL_CMD" python3 -c "import json, os; print('commands=' + json.dumps([os.environ['SHELL_CMD']]))")

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters "$PARAMS" \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "DATABASE_URL provision SSM Command ID: $COMMAND_ID"

        for i in $(seq 1 18); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/18] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "DATABASE_URL provisioned."
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "DATABASE_URL provision failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done

    # Reads CLERK_SECRET_KEY from SSM Parameter Store (SecureString) and writes
    # it into /etc/mtga-companion/env on the EC2 instance via SSM RunCommand.
    #
    # PREREQUISITE: the SSM parameter /mtga-companion/production/CLERK_SECRET_KEY must
    # exist as a SecureString before this workflow runs. Create it once with:
    #   aws ssm put-parameter \
    #     --name /mtga-companion/production/CLERK_SECRET_KEY \
    #     --value "sk_live_..." \
    #     --type SecureString --region us-east-1 --profile personal
    - name: Provision CLERK_SECRET_KEY on EC2
      run: |
        CLERK_SECRET_KEY=$(aws ssm get-parameter \
          --name /mtga-companion/production/CLERK_SECRET_KEY \
          --with-decryption \
          --region us-east-1 \
          --query Parameter.Value \
          --output text)

        if [ -z "$CLERK_SECRET_KEY" ]; then
          echo "ERROR: CLERK_SECRET_KEY parameter is empty in SSM."
          exit 1
        fi

        SHELL_CMD="mkdir -p /etc/mtga-companion && if grep -q '^CLERK_SECRET_KEY=' /etc/mtga-companion/env 2>/dev/null; then sed -i 's|^CLERK_SECRET_KEY=.*|CLERK_SECRET_KEY=${CLERK_SECRET_KEY}|' /etc/mtga-companion/env; else echo 'CLERK_SECRET_KEY=${CLERK_SECRET_KEY}' >> /etc/mtga-companion/env; fi && chmod 600 /etc/mtga-companion/env"
        PARAMS=$(CLERK_SECRET_KEY="$CLERK_SECRET_KEY" SHELL_CMD="$SHELL_CMD" python3 -c "import json, os; print('commands=' + json.dumps([os.environ['SHELL_CMD']]))")

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters "$PARAMS" \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "CLERK_SECRET_KEY provision SSM Command ID: $COMMAND_ID"

        for i in $(seq 1 18); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/18] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "CLERK_SECRET_KEY provisioned."
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Provision failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done

    - name: Stage binary on EC2 via SSM
      run: |
        SHELL_CMD="aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/releases/${{ github.sha }}/mtga-bff /usr/local/bin/mtga-bff.next && chmod +x /usr/local/bin/mtga-bff.next && mv /usr/local/bin/mtga-bff.next /usr/local/bin/mtga-bff"
        PARAMS=$(SHELL_CMD="$SHELL_CMD" python3 -c "import json, os; print('commands=' + json.dumps([os.environ['SHELL_CMD']]))")

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters "$PARAMS" \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "Stage SSM Command ID: $COMMAND_ID"

        for i in $(seq 1 60); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/60] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Binary staged successfully."
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Stage failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done

    - name: Restart BFF service via SSM
      run: |
        SHELL_CMD="systemctl restart mtga-bff"
        PARAMS=$(SHELL_CMD="$SHELL_CMD" python3 -c "import json, os; print('commands=' + json.dumps([os.environ['SHELL_CMD']]))")

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters "$PARAMS" \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "Restart SSM Command ID: $COMMAND_ID"

        for i in $(seq 1 12); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/12] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Service restarted successfully."
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Restart failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done

    - name: Post-deploy health check
      run: |
        SHELL_CMD="for i in \$(seq 1 10); do if curl -sf http://127.0.0.1:8080/healthz > /dev/null; then echo 'healthz OK'; exit 0; fi; sleep 5; done; exit 1"
        PARAMS=$(SHELL_CMD="$SHELL_CMD" python3 -c "import json, os; print('commands=' + json.dumps([os.environ['SHELL_CMD']]))")

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters "$PARAMS" \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "Health check SSM Command ID: $COMMAND_ID"

        for i in $(seq 1 15); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/15] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Health check passed."
            exit 0
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Health check failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        echo "Timed out waiting for health check"
        exit 1
