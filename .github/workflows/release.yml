name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      skip_e2e:
        description: 'Skip E2E smoke tests (emergency releases only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  # Allow other workflows to call this as a reusable workflow
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      prerelease:
        required: false
        default: 'false'
        type: string
      skip_e2e:
        required: false
        default: 'false'
        type: string

permissions:
  contents: write
  id-token: write  # required for OIDC-based AWS auth in deploy job

# ---------------------------------------------------------------------------
# Tier 3 — E2E smoke gate before release (release workflow only)
# ---------------------------------------------------------------------------

jobs:
  # Run E2E smoke tests before cutting the release artifact.
  # Skippable via input for emergency hotfix releases only.
  e2e-smoke-gate:
    name: E2E Smoke Gate
    uses: ./.github/workflows/e2e-smoke.yml
    if: inputs.skip_e2e != 'true'

  release:
    needs: [e2e-smoke-gate]
    # Run if smoke passed OR if smoke was skipped
    if: always() && (needs.e2e-smoke-gate.result == 'success' || needs.e2e-smoke-gate.result == 'skipped')
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Create and push tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ inputs.tag }}
        git push origin ${{ inputs.tag }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build for multiple platforms
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        GOOS=linux   GOARCH=amd64 go build -v -o bin/mtga-companion-linux-amd64   ./cmd/mtga-companion
        GOOS=linux   GOARCH=arm64 go build -v -o bin/mtga-companion-linux-arm64   ./cmd/mtga-companion
        GOOS=darwin  GOARCH=amd64 go build -v -o bin/mtga-companion-darwin-amd64  ./cmd/mtga-companion
        GOOS=darwin  GOARCH=arm64 go build -v -o bin/mtga-companion-darwin-arm64  ./cmd/mtga-companion
        GOOS=windows GOARCH=amd64 go build -v -o bin/mtga-companion-windows-amd64.exe ./cmd/mtga-companion
        GOOS=windows GOARCH=arm64 go build -v -o bin/mtga-companion-windows-arm64.exe ./cmd/mtga-companion

    - name: Generate changelog
      run: |
        echo "## What's Changed" > changelog.md
        git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"* %s (%h)" >> changelog.md || echo "* Initial release" >> changelog.md
        echo "" >> changelog.md
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo 'v0.0.0')...${{ inputs.tag }}" >> changelog.md

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ inputs.tag }}
        files: |
          bin/mtga-companion-linux-amd64
          bin/mtga-companion-linux-arm64
          bin/mtga-companion-darwin-amd64
          bin/mtga-companion-darwin-arm64
          bin/mtga-companion-windows-amd64.exe
          bin/mtga-companion-windows-arm64.exe
        body_path: changelog.md
        draft: false
        prerelease: ${{ inputs.prerelease == 'true' }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy BFF to EC2
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && needs.release.result == 'success'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build BFF for linux/amd64
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        cd services/bff
        GOOS=linux GOARCH=amd64 go build -o mtga-bff ./cmd/main.go

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        aws-region: us-east-1

    - name: Upload binary to S3
      run: |
        aws s3 cp services/bff/mtga-bff \
          s3://${{ secrets.DEPLOY_BUCKET }}/releases/${{ github.sha }}/mtga-bff

    # Reads ALLOWED_ORIGINS from SSM Parameter Store (runner side) and writes it into
    # /etc/mtga-companion/env on the EC2 instance via SSM RunCommand.
    # The sed + grep pattern is idempotent: it replaces the line if the key already
    # exists, otherwise it appends it. The BFF service restart at the end of the
    # Deploy step picks up the updated value.
    #
    # PREREQUISITE: the SSM parameter /mtga-companion/production/ALLOWED_ORIGINS must
    # exist before this workflow runs. Create it once with:
    #   aws ssm put-parameter \
    #     --name /mtga-companion/production/ALLOWED_ORIGINS \
    #     --value "https://mtga-companion.vercel.app,https://*.vercel.app" \
    #     --type String --region us-east-1
    - name: Provision ALLOWED_ORIGINS on EC2
      run: |
        ALLOWED_ORIGINS=$(aws ssm get-parameter \
          --name /mtga-companion/production/ALLOWED_ORIGINS \
          --region us-east-1 \
          --query Parameter.Value \
          --output text)

        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters commands=["mkdir -p /etc/mtga-companion && if grep -q '^ALLOWED_ORIGINS=' /etc/mtga-companion/env 2>/dev/null; then sed -i 's|^ALLOWED_ORIGINS=.*|ALLOWED_ORIGINS=${ALLOWED_ORIGINS}|' /etc/mtga-companion/env; else echo 'ALLOWED_ORIGINS=${ALLOWED_ORIGINS}' >> /etc/mtga-companion/env; fi"] \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "Provision SSM Command ID: $COMMAND_ID"

        for i in $(seq 1 18); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/18] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "ALLOWED_ORIGINS provisioned."
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Provision failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done

    - name: Deploy to EC2 via SSM
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/releases/${{ github.sha }}/mtga-bff /usr/local/bin/mtga-bff && chmod +x /usr/local/bin/mtga-bff && systemctl restart mtga-companion"]' \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"

        for i in $(seq 1 30); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/30] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Deployment succeeded."
            exit 0
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Deployment failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        echo "Timed out waiting for SSM command"
        exit 1
