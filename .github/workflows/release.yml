name: Release

on:
  release:
    types: [published]

  # Allow other workflows to call this as a reusable workflow
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      prerelease:
        required: false
        default: 'false'
        type: string
      skip_e2e:
        required: false
        default: 'false'
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
  IS_PRERELEASE: ${{ github.event_name == 'release' && github.event.release.prerelease || inputs.prerelease || 'false' }}
  SKIP_E2E: ${{ github.event_name == 'release' && contains(github.event.release.name, '[noe2e]') || inputs.skip_e2e || 'false' }}

permissions:
  contents: write
  id-token: write  # required for OIDC-based AWS auth in deploy job

# ---------------------------------------------------------------------------
# Tier 3 — E2E smoke gate before release (release workflow only)
# Tier 2 — Integration gate after E2E smoke, before release artifact
# ---------------------------------------------------------------------------

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight checks — must pass before any release gates run.
  # ---------------------------------------------------------------------------

  # Verify that the staging environment is healthy before cutting a release.
  # Prevents releasing to production against a broken staging baseline.
  staging-health-gate:
    name: Verify Staging Health Before Release
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Check staging /healthz via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["curl -sf http://127.0.0.1:8081/healthz && echo staging-healthz-ok"]' \
            --region us-east-1 \
            --query "Command.CommandId" \
            --output text)

          SUCCEEDED=0
          for i in $(seq 1 12); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/12] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Staging healthy."
              SUCCEEDED=1
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Staging health check failed: $STATUS" >&2
              echo "Run the Staging Deploy workflow against main before releasing." >&2
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --region us-east-1 \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 5
          done
          if [ "$SUCCEEDED" -ne 1 ]; then
            echo "Staging health check timed out." >&2
            exit 1
          fi

  # Verify all required SSM parameters exist in production before releasing.
  # Prevents a deploy from silently failing due to a missing secret.
  secrets-inventory:
    name: Verify Production Secrets Inventory
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Assert required SSM parameters exist
        run: |
          MISSING=0
          for param in \
            /vaultmtg/prod/sentry-auth-token \
            /vaultmtg/prod/sentry-bff-dsn \
            /vaultmtg/prod/sentry-spa-dsn \
            /mtga-companion/production/CLERK_SECRET_KEY \
            /mtga-companion/production/db-secret-arn \
            /mtga-companion/production/db-endpoint \
            /mtga-companion/production/db-name \
            /vaultmtg/production/spa-bucket-name \
            /vaultmtg/production/spa-distribution-id; do
            aws ssm get-parameter --name "$param" --region us-east-1 \
              --query Parameter.Name --output text > /dev/null 2>&1 \
              || { echo "MISSING: $param"; MISSING=1; }
          done
          [ "$MISSING" -eq 0 ] || exit 1

  # ---------------------------------------------------------------------------
  # Release gates — run after pre-flight checks pass.
  # ---------------------------------------------------------------------------

  # Run E2E smoke tests before cutting the release artifact.
  # Skippable via input for emergency hotfix releases only.
  # Note: env context is not available in job-level if conditions; skip
  # logic is expressed directly using github and inputs contexts.
  e2e-smoke-gate:
    name: E2E Smoke Gate
    needs: [staging-health-gate, secrets-inventory]
    uses: ./.github/workflows/e2e-smoke.yml
    if: >-
      !(github.event_name == 'release' && contains(github.event.release.name, '[noe2e]')) &&
      inputs.skip_e2e != 'true'

  # Run BFF integration tests after E2E smoke passes.
  # Blocks the release if any integration test fails.
  integration-gate:
    name: Integration Gate
    needs: [e2e-smoke-gate]
    if: always() && (needs.e2e-smoke-gate.result == 'success' || needs.e2e-smoke-gate.result == 'skipped')
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  release:
    needs: [e2e-smoke-gate, integration-gate]
    # Run if smoke passed (or skipped) AND integration tests passed
    if: always() && (needs.e2e-smoke-gate.result == 'success' || needs.e2e-smoke-gate.result == 'skipped') && needs.integration-gate.result == 'success'
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    # Legacy `cmd/mtga-companion` (Wails-era desktop monolith) was
    # removed in PR #19. The replacement daemon ships via
    # daemon-release.yml as mtga-companion-daemon-<os>-<arch>; the BFF
    # ships from this same workflow further below. Nothing else gets
    # built into a tagged GitHub Release from this top-level step.

    - name: Generate changelog
      run: |
        echo "## What's Changed" > changelog.md
        PREV_TAG="$(git describe --tags --abbrev=0 --match 'v*' HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"
        git log "${PREV_TAG}..HEAD" --pretty=format:"* %s (%h)" >> changelog.md || echo "* Initial release" >> changelog.md
        echo "" >> changelog.md
        COMPARE_BASE="$(git describe --tags --abbrev=0 --match 'v*' HEAD^ 2>/dev/null || echo 'v0.0.0')"
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${COMPARE_BASE}...${{ env.RELEASE_TAG }}" >> changelog.md

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        # No binaries attached at this level — daemon binaries ship via
        # daemon-release.yml on `daemon/v*` tags; BFF deploys directly to
        # EC2 in the `deploy` job below.
        body_path: changelog.md
        draft: false
        prerelease: ${{ env.IS_PRERELEASE == 'true' }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy BFF to EC2
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && needs.release.result == 'success'
    environment: production
    concurrency:
      group: bff-prod-deploy
      cancel-in-progress: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Build BFF for linux/amd64
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        cd services/bff
        GOOS=linux GOARCH=amd64 go build -o mtga-bff ./cmd

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        aws-region: us-east-1

    - name: Upload binary to S3
      run: |
        aws s3 cp services/bff/mtga-bff \
          s3://${{ secrets.DEPLOY_BUCKET }}/releases/${{ github.sha }}/mtga-bff

    # Upload provisioning scripts to S3 so the EC2 instance can fetch and run them.
    # Scripts live in scripts/deploy/ and are uploaded once per deploy run.
    - name: Upload deploy scripts to S3
      run: |
        aws s3 sync scripts/deploy/ \
          s3://${{ secrets.DEPLOY_BUCKET }}/scripts/ \
          --exclude "*" --include "*.sh"
        aws s3 sync infra/scripts/ \
          s3://${{ secrets.DEPLOY_BUCKET }}/infra-scripts/ \
          --exclude "*" --include "*.sh"
        aws s3 sync services/bff/internal/storage/migrations/postgres/ \
          s3://${{ secrets.DEPLOY_BUCKET }}/migrations/postgres/ \
          --delete
        aws s3 sync infra/db/ \
          s3://${{ secrets.DEPLOY_BUCKET }}/infra-db/ \
          --exclude "*" --include "*.sql"

    # Reads ALLOWED_ORIGINS from SSM Parameter Store on the EC2 instance and writes it
    # into /etc/mtga-companion/env.  The script handles upsert (replace or append).
    # The BFF service restart at the end of the deploy step picks up the updated value.
    #
    # PREREQUISITE: the SSM parameter /mtga-companion/production/ALLOWED_ORIGINS must
    # exist before this workflow runs. Create or update it with:
    #   aws ssm put-parameter \
    #     --name /mtga-companion/production/ALLOWED_ORIGINS \
    #     --value "https://app.vaultmtg.app,https://vaultmtg.app,https://www.vaultmtg.app" \
    #     --type String --overwrite --region us-east-1
    - name: Provision ALLOWED_ORIGINS on EC2
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/scripts/provision-env.sh /tmp/provision-env.sh && chmod +x /tmp/provision-env.sh && /tmp/provision-env.sh ALLOWED_ORIGINS /mtga-companion/production/ALLOWED_ORIGINS"]' \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "Provision SSM Command ID: $COMMAND_ID"

        SUCCEEDED=0
        for i in $(seq 1 18); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/18] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "ALLOWED_ORIGINS provisioned."
            SUCCEEDED=1
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Provision failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        if [ "$SUCCEEDED" -ne 1 ]; then
          echo "SSM command timed out waiting for ALLOWED_ORIGINS provision" >&2
          exit 1
        fi

    # Fetches the RDS credential from Secrets Manager ON the EC2 instance and writes
    # DATABASE_URL into /etc/mtga-companion/env.  The plaintext password never touches
    # the GitHub Actions runner or appears in workflow logs.
    # The instance IAM role must have secretsmanager:GetSecretValue on the secret ARN
    # (already granted via the EC2 CloudFormation stack).
    #
    # PREREQUISITE: the following SSM parameters must exist before this workflow runs:
    #   /mtga-companion/production/db-secret-arn  (RDS secret ARN from rds stack output)
    #   /mtga-companion/production/db-endpoint     (RDS hostname)
    #   /mtga-companion/production/db-name         (database name)
    - name: Provision DATABASE_URL on EC2
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/scripts/provision-db-url.sh /tmp/provision-db-url.sh && chmod +x /tmp/provision-db-url.sh && /tmp/provision-db-url.sh"]' \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "DATABASE_URL provision SSM Command ID: $COMMAND_ID"

        SUCCEEDED=0
        for i in $(seq 1 18); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/18] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "DATABASE_URL provisioned."
            SUCCEEDED=1
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "DATABASE_URL provision failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        if [ "$SUCCEEDED" -ne 1 ]; then
          echo "SSM command timed out waiting for DATABASE_URL provision" >&2
          exit 1
        fi

    # Reads CLERK_SECRET_KEY from SSM Parameter Store (SecureString) on the EC2 instance
    # and writes it into /etc/mtga-companion/env.  The --with-decryption flag is handled
    # by the provision-env.sh script running on the instance under the instance IAM role.
    #
    # PREREQUISITE: the SSM parameter /mtga-companion/production/CLERK_SECRET_KEY must
    # exist as a SecureString before this workflow runs. Create it once with:
    #   aws ssm put-parameter \
    #     --name /mtga-companion/production/CLERK_SECRET_KEY \
    #     --value "sk_live_..." \
    #     --type SecureString --region us-east-1 --profile personal
    - name: Provision CLERK_SECRET_KEY on EC2
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/scripts/provision-env.sh /tmp/provision-env.sh && chmod +x /tmp/provision-env.sh && /tmp/provision-env.sh CLERK_SECRET_KEY /mtga-companion/production/CLERK_SECRET_KEY --with-decryption"]' \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "CLERK_SECRET_KEY provision SSM Command ID: $COMMAND_ID"

        SUCCEEDED=0
        for i in $(seq 1 18); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/18] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "CLERK_SECRET_KEY provisioned."
            SUCCEEDED=1
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Provision failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        if [ "$SUCCEEDED" -ne 1 ]; then
          echo "SSM command timed out waiting for CLERK_SECRET_KEY provision" >&2
          exit 1
        fi

    # Downloads stage-binary.sh from S3 and runs it on EC2.
    # DEPLOY_BUCKET and DEPLOY_SHA are passed as SSM environment variables so no
    # values containing special characters are embedded in the JSON command string.
    - name: Stage binary on EC2 via SSM
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/scripts/stage-binary.sh /tmp/stage-binary.sh && chmod +x /tmp/stage-binary.sh && /tmp/stage-binary.sh"]' \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text \
          --environment-variables "DEPLOY_BUCKET=${{ secrets.DEPLOY_BUCKET }},DEPLOY_SHA=${{ github.sha }}")

        echo "Stage SSM Command ID: $COMMAND_ID"

        SUCCEEDED=0
        for i in $(seq 1 60); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/60] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Binary staged successfully."
            SUCCEEDED=1
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Stage failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        if [ "$SUCCEEDED" -ne 1 ]; then
          echo "SSM command timed out waiting for binary staging" >&2
          exit 1
        fi

    - name: Run database migrations via SSM
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["export DEPLOY_BUCKET=${{ secrets.DEPLOY_BUCKET }} && export AWS_REGION=us-east-1 && aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/infra-scripts/run-migrations.sh /tmp/run-migrations.sh && chmod +x /tmp/run-migrations.sh && /tmp/run-migrations.sh"]' \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "Migrations SSM Command ID: $COMMAND_ID"

        SUCCEEDED=0
        for i in $(seq 1 18); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/18] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Migrations complete."
            SUCCEEDED=1
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Migrations failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        if [ "$SUCCEEDED" -ne 1 ]; then
          echo "SSM command timed out waiting for migrations" >&2
          exit 1
        fi

    - name: Restart BFF service via SSM
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/scripts/restart-bff.sh /tmp/restart-bff.sh && chmod +x /tmp/restart-bff.sh && /tmp/restart-bff.sh"]' \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "Restart SSM Command ID: $COMMAND_ID"

        SUCCEEDED=0
        for i in $(seq 1 12); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/12] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Service restarted successfully."
            SUCCEEDED=1
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Restart failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        if [ "$SUCCEEDED" -ne 1 ]; then
          echo "SSM command timed out waiting for BFF restart" >&2
          exit 1
        fi

    - name: Post-deploy health check
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/scripts/healthcheck-bff.sh /tmp/healthcheck-bff.sh && chmod +x /tmp/healthcheck-bff.sh && /tmp/healthcheck-bff.sh"]' \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "Health check SSM Command ID: $COMMAND_ID"

        for i in $(seq 1 15); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/15] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Health check passed."
            exit 0
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Health check failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        echo "Timed out waiting for health check"
        exit 1

  deploy-spa:
    name: Deploy SPA
    needs: [release]
    if: needs.release.result == 'success'
    uses: ./.github/workflows/deploy-spa.yml
    secrets: inherit
