name: Release

on:
  # Fires only for app/v* tags pushed directly (e.g. app/v0.3.1).
  # daemon/v* tags are handled exclusively by daemon-release.yml.
  push:
    tags:
      - 'app/v*'

  # Allow other workflows to call this as a reusable workflow
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g. app/v1.0.0)'
        required: true
        type: string
      prerelease:
        required: false
        default: 'false'
        type: string
      skip_e2e:
        required: false
        default: 'false'
        type: string

env:
  # For push: tags events, github.ref_name is the pushed tag (e.g. app/v0.3.1).
  # For workflow_call, the tag comes from the explicit input.
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
  # Prerelease detection: treat tags containing "-rc", "-alpha", or "-beta" as pre-releases.
  # For workflow_call the caller supplies this explicitly.
  IS_PRERELEASE: ${{ github.event_name == 'push' && (contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta')) || inputs.prerelease || 'false' }}
  # E2E skip is only meaningful for workflow_call (emergency hotfix flag).
  # For push: tags events, E2E always runs.
  SKIP_E2E: ${{ inputs.skip_e2e || 'false' }}

permissions:
  contents: write
  id-token: write  # required for OIDC-based AWS auth in deploy job

# ---------------------------------------------------------------------------
# Tier 3 — E2E smoke gate before release (release workflow only)
# Tier 2 — Integration gate after E2E smoke, before release artifact
# ---------------------------------------------------------------------------

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight checks — must pass before any release gates run.
  # ---------------------------------------------------------------------------

  # Verify that the staging environment is healthy before cutting a release.
  # Prevents releasing to production against a broken staging baseline.
  staging-health-gate:
    name: Verify Staging Health Before Release
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Check staging /healthz via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["curl -sf http://127.0.0.1:8081/healthz && echo staging-healthz-ok"]' \
            --region us-east-1 \
            --query "Command.CommandId" \
            --output text)

          SUCCEEDED=0
          for i in $(seq 1 12); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/12] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Staging healthy."
              SUCCEEDED=1
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Staging health check failed: $STATUS" >&2
              echo "Run the Staging Deploy workflow against main before releasing." >&2
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --region us-east-1 \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 5
          done
          if [ "$SUCCEEDED" -ne 1 ]; then
            echo "Staging health check timed out." >&2
            exit 1
          fi

  # Verify all required SSM parameters exist in production before releasing.
  # Prevents a deploy from silently failing due to a missing secret.
  secrets-inventory:
    name: Verify Production Secrets Inventory
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Assert required SSM parameters exist
        run: |
          MISSING=0
          for param in \
            /vaultmtg/prod/sentry-auth-token \
            /vaultmtg/prod/sentry-bff-dsn \
            /vaultmtg/prod/sentry-spa-dsn \
            /vaultmtg/app/production/CLERK_SECRET_KEY \
            /vaultmtg/app/production/db-secret-arn \
            /vaultmtg/app/production/db-endpoint \
            /vaultmtg/app/production/db-name \
            /vaultmtg/production/spa-bucket-name \
            /vaultmtg/production/spa-distribution-id; do
            aws ssm get-parameter --name "$param" --region us-east-1 \
              --query Parameter.Name --output text > /dev/null 2>&1 \
              || { echo "MISSING: $param"; MISSING=1; }
          done
          [ "$MISSING" -eq 0 ] || exit 1

  # ---------------------------------------------------------------------------
  # Release gates — run after pre-flight checks pass.
  # ---------------------------------------------------------------------------

  # Run E2E smoke tests before cutting the release artifact.
  # Skippable via input for emergency hotfix releases only.
  # Note: env context is not available in job-level if conditions; skip
  # logic is expressed directly using github and inputs contexts.
  # For push: tags events, E2E always runs (no [noe2e] mechanism; use workflow_call
  # with skip_e2e=true for emergency hotfix bypasses instead).
  e2e-smoke-gate:
    name: E2E Smoke Gate
    needs: [staging-health-gate, secrets-inventory]
    uses: ./.github/workflows/e2e-smoke.yml
    if: inputs.skip_e2e != 'true'

  # Run BFF integration tests after E2E smoke passes.
  # Blocks the release if any integration test fails.
  integration-gate:
    name: Integration Gate
    needs: [e2e-smoke-gate]
    if: always() && (needs.e2e-smoke-gate.result == 'success' || needs.e2e-smoke-gate.result == 'skipped')
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  release:
    needs: [e2e-smoke-gate, integration-gate]
    # Run if smoke passed (or skipped) AND integration tests passed
    if: always() && (needs.e2e-smoke-gate.result == 'success' || needs.e2e-smoke-gate.result == 'skipped') && needs.integration-gate.result == 'success'
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    # Legacy `cmd/mtga-companion` (Wails-era desktop monolith) was
    # removed in PR #19. The replacement daemon ships via
    # daemon-release.yml as mtga-companion-daemon-<os>-<arch>; the BFF
    # ships from this same workflow further below. Nothing else gets
    # built into a tagged GitHub Release from this top-level step.

    - name: Generate changelog
      run: |
        echo "## What's Changed" > changelog.md
        PREV_TAG="$(git describe --tags --abbrev=0 --match 'app/v*' HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"
        git log "${PREV_TAG}..HEAD" --pretty=format:"* %s (%h)" >> changelog.md || echo "* Initial release" >> changelog.md
        echo "" >> changelog.md
        COMPARE_BASE="$(git describe --tags --abbrev=0 --match 'app/v*' HEAD^ 2>/dev/null || echo 'v0.0.0')"
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${COMPARE_BASE}...${{ env.RELEASE_TAG }}" >> changelog.md

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        # No binaries attached at this level — daemon binaries ship via
        # daemon-release.yml on `daemon/v*` tags; BFF deploys directly to
        # EC2 in the `deploy` job below.
        body_path: changelog.md
        draft: false
        prerelease: ${{ env.IS_PRERELEASE == 'true' }}
        generate_release_notes: true
        # Never let an app release become the repo's "latest" release.
        # The production daemon download (frontend/src/components/DaemonDownload.tsx:11)
        # resolves binaries via releases/latest/download/... — if an app release
        # (which has no binary assets) claimed "latest", that URL would 404.
        make_latest: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Delegates to the shared deploy-bff reusable workflow.
  # Production deploy uses the exact same job graph as staging (run via staging-deploy.yml
  # on every push to main). Any defect in the deploy path surfaces in staging first.
  # DEPLOY_BUCKET is passed as a secret because workflow inputs cannot reference secrets.
  deploy:
    name: Deploy BFF to EC2
    needs: [release]
    if: always() && needs.release.result == 'success'
    uses: ./.github/workflows/deploy-bff.yml
    with:
      environment: production
      s3-binary-key-suffix: releases/${{ github.sha }}/mtga-bff
      binary-name: mtga-bff
      deploy-sha: ${{ github.sha }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      DEPLOY_BUCKET: ${{ secrets.DEPLOY_BUCKET }}

  deploy-spa:
    name: Deploy SPA
    needs: [release]
    if: needs.release.result == 'success'
    uses: ./.github/workflows/deploy-spa.yml
    secrets: inherit
