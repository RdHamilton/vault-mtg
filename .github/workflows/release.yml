name: Release

# Disabled: architecture in flux — run manually when ready to cut a release
on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # required for OIDC-based AWS auth in deploy job

jobs:
  # Run E2E tests before building release
  e2e-validation:
    name: E2E Validation
    uses: ./.github/workflows/e2e-full.yml
    with:
      run_cross_browser: true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [e2e-validation]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run tests
      run: go test -v -race ./...

    - name: Build for multiple platforms
      run: |
        # Build for Linux
        GOOS=linux GOARCH=amd64 go build -v -o bin/mtga-companion-linux-amd64 ./cmd/mtga-companion
        GOOS=linux GOARCH=arm64 go build -v -o bin/mtga-companion-linux-arm64 ./cmd/mtga-companion

        # Build for macOS
        GOOS=darwin GOARCH=amd64 go build -v -o bin/mtga-companion-darwin-amd64 ./cmd/mtga-companion
        GOOS=darwin GOARCH=arm64 go build -v -o bin/mtga-companion-darwin-arm64 ./cmd/mtga-companion

        # Build for Windows
        GOOS=windows GOARCH=amd64 go build -v -o bin/mtga-companion-windows-amd64.exe ./cmd/mtga-companion
        GOOS=windows GOARCH=arm64 go build -v -o bin/mtga-companion-windows-arm64.exe ./cmd/mtga-companion

    - name: Generate changelog
      id: changelog
      run: |
        echo "## What's Changed" > changelog.md
        git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"* %s (%h)" >> changelog.md || echo "* Initial release" >> changelog.md
        echo "" >> changelog.md
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo 'v0.0.0')...${{ github.ref_name }}" >> changelog.md

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          bin/mtga-companion-linux-amd64
          bin/mtga-companion-linux-arm64
          bin/mtga-companion-darwin-amd64
          bin/mtga-companion-darwin-arm64
          bin/mtga-companion-windows-amd64.exe
          bin/mtga-companion-windows-arm64.exe
        body_path: changelog.md
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------
  # Deploy BFF to EC2 via S3 + SSM (ticket #969)
  # Runs after release job succeeds. Uses OIDC — no long-lived keys.
  # Required GitHub secrets:
  #   AWS_DEPLOY_ROLE_ARN  — ARN of the GitHubActionsDeployRole (from deploy-artifacts stack)
  #   EC2_INSTANCE_ID      — EC2 instance ID to target with SSM
  #   DEPLOY_BUCKET        — S3 bucket name (from deploy-artifacts stack output)
  # ---------------------------------------------------------
  deploy:
    name: Deploy BFF to EC2
    runs-on: ubuntu-latest
    needs: [release]
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build BFF for linux/amd64
      run: |
        cd services/bff
        GOOS=linux GOARCH=amd64 go build -o mtga-bff ./cmd/main.go

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        aws-region: us-east-1

    - name: Upload binary to S3
      run: |
        aws s3 cp services/bff/mtga-bff \
          s3://${{ secrets.DEPLOY_BUCKET }}/releases/${{ github.sha }}/mtga-bff

    - name: Deploy to EC2 via SSM
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=["aws s3 cp s3://${{ secrets.DEPLOY_BUCKET }}/releases/${{ github.sha }}/mtga-bff /usr/local/bin/mtga-bff && chmod +x /usr/local/bin/mtga-bff && systemctl restart mtga-companion"]' \
          --region us-east-1 \
          --query "Command.CommandId" \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"

        # Wait for command completion (poll up to 5 minutes)
        for i in $(seq 1 30); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region us-east-1 \
            --query "Status" \
            --output text 2>/dev/null || echo "Pending")
          echo "[$i/30] Status: $STATUS"
          if [ "$STATUS" = "Success" ]; then
            echo "Deployment succeeded."
            exit 0
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Deployment failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region us-east-1 \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
          sleep 10
        done
        echo "Timed out waiting for SSM command"
        exit 1
