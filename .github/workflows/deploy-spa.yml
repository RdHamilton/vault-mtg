name: Deploy SPA to S3 + CloudFront

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref/SHA to deploy. Empty = workflow source ref.'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      ref:
        description: 'Git ref/SHA to deploy. Empty = workflow source ref.'
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy SPA
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # When inputs.ref is empty, actions/checkout falls back to the
          # workflow source ref (existing default behaviour for push: tags).
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Resolve the semver string for Sentry release tagging.
      # Uses `git describe` against `app/v*` tags (ADR-023 namespacing) and strips
      # the `app/v` prefix so the value matches the BFF ldflag output (e.g. "0.3.3").
      # Falls back to an empty string on an untagged ref (e.g. manual workflow_dispatch
      # on a branch commit) — Sentry.init skips the release field when the value is empty.
      - name: Resolve SPA version from git tag
        id: version
        run: |
          RAW=$(git describe --tags --match 'app/v*' --abbrev=0 2>/dev/null || echo '')
          echo "version=${RAW#app/v}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # Read S3 bucket name, CloudFront distribution ID, and Sentry DSN from SSM at deploy
      # time. Keeps infrastructure config out of repository vars/secrets and in one central
      # place (canonical SSM-as-source-of-truth pattern established in vault-mtg-tickets#16).
      - name: Read SSM parameters
        id: ssm
        run: |
          BUCKET=$(aws ssm get-parameter \
            --name /vaultmtg/production/spa-bucket-name \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          DIST_ID=$(aws ssm get-parameter \
            --name /vaultmtg/production/spa-distribution-id \
            --region us-east-1 \
            --query Parameter.Value \
            --output text)
          SENTRY_DSN=$(aws ssm get-parameter \
            --name /vaultmtg/app/production/sentry-dsn-spa \
            --region us-east-1 \
            --with-decryption \
            --query Parameter.Value \
            --output text)
          {
            echo "bucket=$BUCKET"
            echo "dist_id=$DIST_ID"
            echo "sentry_dsn=$SENTRY_DSN"
          } >> "$GITHUB_OUTPUT"

      - name: Build React SPA
        working-directory: frontend
        run: npm run build
        env:
          VITE_BFF_URL: ${{ vars.VITE_BFF_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_SENTRY_DSN: ${{ steps.ssm.outputs.sentry_dsn }}
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
          VITE_SENTRY_ENV: production
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Sync build output to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.ssm.outputs.bucket }} \
            --delete \
            --region us-east-1

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.ssm.outputs.dist_id }} \
            --paths "/*"

      - name: Post-deploy SPA smoke check
        run: |
          for i in $(seq 1 6); do
            if curl -fsSL https://app.vaultmtg.app/ | grep -q '<div id="root"'; then
              echo "SPA smoke check passed."
              exit 0
            fi
            echo "Attempt $i/6 failed, waiting 10s..."
            sleep 10
          done
          echo "SPA smoke check failed after 60s"
          exit 1
