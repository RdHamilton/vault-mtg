name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Tier 1 — Fast jobs (run on every PR, path-filtered per module)
# ---------------------------------------------------------------------------

jobs:
  # BFF unit tests — only when BFF or shared contract files change
  bff-unit-tests:
    name: BFF Unit Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for BFF/contract changes
      id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: |
          bff:
            - 'services/bff/**'
            - 'services/contract/**'
            - '.github/workflows/ci.yml'

    - name: Set up Go
      if: steps.changes.outputs.bff == 'true'
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Download dependencies
      if: steps.changes.outputs.bff == 'true'
      working-directory: services/bff
      run: go mod download

    - name: Run BFF unit tests
      if: steps.changes.outputs.bff == 'true'
      working-directory: services/bff
      run: go test -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      if: steps.changes.outputs.bff == 'true'
      uses: codecov/codecov-action@v4
      with:
        files: ./services/bff/coverage.out
        flags: bff-unit
        fail_ci_if_error: false

  # Frontend component tests — only when frontend files change
  frontend-component-tests:
    name: Frontend Component Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for frontend changes
      id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: |
          frontend:
            - 'frontend/**'
            - '.github/workflows/ci.yml'

    - name: Set up Node.js
      if: steps.changes.outputs.frontend == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      if: steps.changes.outputs.frontend == 'true'
      run: |
        cd frontend
        npm ci

    - name: TypeScript type check
      if: steps.changes.outputs.frontend == 'true'
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Run component tests
      if: steps.changes.outputs.frontend == 'true'
      run: |
        cd frontend
        npm run test:run

    - name: Upload coverage to Codecov
      if: steps.changes.outputs.frontend == 'true'
      uses: codecov/codecov-action@v4
      with:
        files: ./frontend/coverage/coverage-final.json
        flags: frontend
        fail_ci_if_error: false
