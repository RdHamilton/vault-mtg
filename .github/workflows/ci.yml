name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Tier 1 — Fast jobs (run on every PR, path-filtered per module)
# ---------------------------------------------------------------------------

jobs:
  gowork-replace-lint:
    name: Lint — go.work must not contain replace directives
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fail if go.work contains a replace directive
        run: |
          if grep -E '^\s*replace\b' go.work 2>/dev/null; then
            echo "ERROR: go.work contains a 'replace' directive."
            echo "Local replace directives must be removed before merging to main."
            echo "See ADR-001 Go Workspace Rules."
            exit 1
          fi
          echo "go.work is clean — no replace directives found."

  lint-workflows:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go (for actionlint install)
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Cache actionlint binary
        id: cache-actionlint
        uses: actions/cache@v4
        with:
          path: ~/go/bin/actionlint
          key: actionlint-${{ runner.os }}-latest

      - name: Install actionlint
        if: steps.cache-actionlint.outputs.cache-hit != 'true'
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: actionlint

  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      bff: ${{ steps.filter.outputs.bff }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sync: ${{ steps.filter.outputs.sync }}
      logparse: ${{ steps.filter.outputs.logparse }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Path filter
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          bff:
            - 'services/bff/**'
            - 'services/contract/**'
            - '.github/workflows/ci.yml'
          frontend:
            - 'frontend/**'
            - '.github/workflows/ci.yml'
          sync:
            - 'services/sync/**'
            - '.github/workflows/ci.yml'
          logparse:
            - 'pkg/logparse/**'
            - '.github/workflows/ci.yml'

  bff-unit-tests:
    name: BFF Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.bff == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Download dependencies
      working-directory: services/bff
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run BFF unit tests
      working-directory: services/bff
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./services/bff/coverage.out
        flags: bff-unit
        fail_ci_if_error: false

  frontend-component-tests:
    name: Frontend Component Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: TypeScript type check
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Run component tests
      run: |
        cd frontend
        npm run test:run

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./frontend/coverage/coverage-final.json
        flags: frontend
        fail_ci_if_error: false

  go-lint:
    name: Go Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.bff == 'true' || needs.detect-changes.outputs.logparse == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: go vet — all modules
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        for mod in services/bff services/daemon services/sync services/contract pkg/logparse; do
          echo "=== go vet $mod ==="
          (cd "$mod" && go vet ./...)
        done

    - name: Install gofumpt
      run: go install mvdan.cc/gofumpt@latest

    - name: gofumpt check — all modules
      run: |
        OUT=$(gofumpt -l services/bff services/daemon services/sync services/contract pkg/logparse)
        if [ -n "$OUT" ]; then
          echo "gofumpt formatting violations:"
          echo "$OUT"
          exit 1
        fi
        echo "gofumpt clean."

  sync-unit-tests:
    name: Sync Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.sync == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Download dependencies
      working-directory: services/sync
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run Sync unit tests
      working-directory: services/sync
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./services/sync/coverage.out
        flags: sync-unit
        fail_ci_if_error: false

  logparse-unit-tests:
    name: LogParse Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.logparse == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Download dependencies
      working-directory: pkg/logparse
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run logparse unit tests
      working-directory: pkg/logparse
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./pkg/logparse/coverage.out
        flags: logparse-unit
        fail_ci_if_error: false

  frontend-e2e:
    name: Frontend E2E Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Build BFF binary
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        cd services/bff
        go build -o ../../bin/mtga-bff ./cmd/main.go

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: cd frontend && npm ci

    - name: Install Playwright browsers
      run: cd frontend && npx playwright install chromium --with-deps

    - name: Run E2E tests
      run: cd frontend && npm run test:e2e:pipeline
      env:
        CI: true
        # BFF config.Load() defaults MTGA_ENV to "production" which requires
        # DATABASE_URL and CLERK_SECRET_KEY. Set to "development" so the BFF
        # starts without a database for the pipeline log-fixture tests.
        MTGA_ENV: development

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-e2e-report
        path: frontend/playwright-report/
        retention-days: 7
