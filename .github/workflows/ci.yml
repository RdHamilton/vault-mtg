name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.cursorrules'
      - 'CLAUDE.md'
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Tier 1 — Fast jobs (run on every PR, path-filtered per module)
# ---------------------------------------------------------------------------

jobs:
  gowork-replace-lint:
    name: Lint — go.work must not contain replace directives
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fail if go.work contains a replace directive
        run: |
          if grep -E '^\s*replace\b' go.work 2>/dev/null; then
            echo "ERROR: go.work contains a 'replace' directive."
            echo "Local replace directives must be removed before merging to main."
            echo "See ADR-001 Go Workspace Rules."
            exit 1
          fi
          echo "go.work is clean — no replace directives found."

  lint-workflows:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go (for actionlint install)
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Cache actionlint binary
        id: cache-actionlint
        uses: actions/cache@v4
        with:
          path: ~/go/bin/actionlint
          key: actionlint-${{ runner.os }}-latest

      - name: Install actionlint
        if: steps.cache-actionlint.outputs.cache-hit != 'true'
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: actionlint

  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      bff: ${{ steps.filter.outputs.bff }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sync: ${{ steps.filter.outputs.sync }}
      logparse: ${{ steps.filter.outputs.logparse }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Path filter
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          bff:
            - 'services/bff/**'
            - 'services/contract/**'
            - '.github/workflows/ci.yml'
          frontend:
            - 'frontend/**'
            - '.github/workflows/ci.yml'
          sync:
            - 'services/sync/**'
            - '.github/workflows/ci.yml'
          logparse:
            - 'pkg/logparse/**'
            - '.github/workflows/ci.yml'

  bff-unit-tests:
    name: BFF Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.bff == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/bff/go.sum

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Download dependencies
      working-directory: services/bff
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run BFF unit tests
      working-directory: services/bff
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./services/bff/coverage.out
        flags: bff-unit
        fail_ci_if_error: false

  frontend-component-tests:
    name: Frontend Component Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: TypeScript type check
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Run component tests
      run: |
        cd frontend
        npm run test:run

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./frontend/coverage/coverage-final.json
        flags: frontend
        fail_ci_if_error: false

  go-lint:
    name: Go Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.bff == 'true' || needs.detect-changes.outputs.logparse == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: |
          services/bff/go.sum
          services/daemon/go.sum
          services/sync/go.sum
          services/contract/go.sum
          pkg/logparse/go.sum

    - name: go vet — all modules
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        for mod in services/bff services/daemon services/sync services/contract pkg/logparse; do
          echo "=== go vet $mod ==="
          (cd "$mod" && go vet ./...)
        done

    - name: Cache gofumpt binary
      id: cache-gofumpt
      uses: actions/cache@v4
      with:
        path: ~/go/bin/gofumpt
        key: gofumpt-${{ runner.os }}-latest

    - name: Install gofumpt
      if: steps.cache-gofumpt.outputs.cache-hit != 'true'
      run: go install mvdan.cc/gofumpt@latest

    - name: gofumpt check — all modules
      run: |
        OUT=$(gofumpt -l services/bff services/daemon services/sync services/contract pkg/logparse)
        if [ -n "$OUT" ]; then
          echo "gofumpt formatting violations:"
          echo "$OUT"
          exit 1
        fi
        echo "gofumpt clean."

  sync-unit-tests:
    name: Sync Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.sync == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/sync/go.sum

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Download dependencies
      working-directory: services/sync
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run Sync unit tests
      working-directory: services/sync
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./services/sync/coverage.out
        flags: sync-unit
        fail_ci_if_error: false

  logparse-unit-tests:
    name: LogParse Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.logparse == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: pkg/logparse/go.sum

    - name: Download dependencies
      working-directory: pkg/logparse
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        GOFLAGS: -mod=mod
      run: go mod download

    - name: Run logparse unit tests
      working-directory: pkg/logparse
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: go test -race -v -short -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./pkg/logparse/coverage.out
        flags: logparse-unit
        fail_ci_if_error: false

  # -------------------------------------------------------------------------
  # Build the BFF binary ONCE, then fan out to E2E shards. Avoids 4x
  # redundant `go build` (~30s each) and 4x setup-go caching overhead.
  # -------------------------------------------------------------------------
  build-bff-for-e2e:
    name: Build BFF binary (E2E)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: services/bff/go.sum

    - name: Configure private module access
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Build BFF binary
      env:
        GONOSUMDB: github.com/RdHamilton/MTGA-Companion
        GOPRIVATE: github.com/RdHamilton/MTGA-Companion
      run: |
        cd services/bff
        go build -o ../../bin/mtga-bff ./cmd/main.go

    - name: Upload BFF binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: mtga-bff-binary
        path: bin/mtga-bff
        retention-days: 1
        if-no-files-found: error

  # -------------------------------------------------------------------------
  # Frontend E2E sharded across 4 parallel runners.
  # Wall-clock target: ~10-12 min (vs. 38-42 min unsharded).
  # -------------------------------------------------------------------------
  frontend-e2e:
    name: Frontend E2E Tests (shard ${{ matrix.shard }}/4)
    needs: [detect-changes, build-bff-for-e2e]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 18

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download BFF binary artifact
      uses: actions/download-artifact@v4
      with:
        name: mtga-bff-binary
        path: bin

    - name: Make BFF binary executable
      run: chmod +x bin/mtga-bff

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: cd frontend && npm ci

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: cd frontend && npx playwright install chromium --with-deps

    - name: Install Playwright system deps (cache hit path)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: cd frontend && npx playwright install-deps chromium

    - name: Run E2E tests (shard ${{ matrix.shard }}/4)
      run: cd frontend && npm run test:e2e:pipeline -- --shard=${{ matrix.shard }}/4 --reporter=blob
      env:
        CI: true
        # BFF config.Load() defaults MTGA_ENV to "production" which requires
        # DATABASE_URL and CLERK_SECRET_KEY. Set to "development" so the BFF
        # starts without a database for the pipeline log-fixture tests.
        MTGA_ENV: development
        # Removes auth from GET /api/v1/events so pipeline log-fixture tests
        # can receive SSE events without a database or Clerk key.
        # Safe only because MTGA_ENV=development above; never set in staging/prod.
        BFF_E2E_UNGUARDED_SSE: true

    - name: Upload blob report shard
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: blob-report-${{ matrix.shard }}
        path: frontend/blob-report
        retention-days: 1
        if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # Merge sharded blob reports into a single HTML report.
  # Runs even if some shards failed so you always have a unified report.
  # -------------------------------------------------------------------------
  merge-e2e-reports:
    name: Merge E2E reports
    if: ${{ !cancelled() && needs.frontend-e2e.result != 'skipped' }}
    needs: [frontend-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Playwright (for merge-reports)
      run: cd frontend && npm ci

    - name: Download all blob reports
      uses: actions/download-artifact@v4
      with:
        path: frontend/all-blob-reports
        pattern: blob-report-*
        merge-multiple: true

    - name: Merge into HTML report
      run: cd frontend && npx playwright merge-reports --reporter=html ./all-blob-reports

    - name: Upload merged HTML report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-e2e-report
        path: frontend/playwright-report
        retention-days: 7
