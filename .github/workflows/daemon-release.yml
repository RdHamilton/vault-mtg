# daemon-release.yml — Release workflow for the daemon module
#
# Responsibility: cross-compile release binaries and publish a GitHub Release.
# Triggers on `daemon/v*` tags (e.g. daemon/v1.2.3) or manual workflow_dispatch.
#
# CI (tests on push/PR) is handled exclusively by daemon.yml.
#
# Binary naming convention: mtga-companion-daemon-<os>-<arch>[.exe]
# Local `make build` must produce the same base names (see services/daemon/Makefile).

name: Daemon Release

on:
  push:
    tags:
      - 'daemon/v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    # Run tests first so a broken build never produces a release artifact.
    name: Daemon Tests (pre-release gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Run tests
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go test -race ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [test]

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: mtga-companion-daemon-windows-amd64.exe
          - goos: darwin
            goarch: arm64
            binary: mtga-companion-daemon-darwin-arm64
          - goos: darwin
            goarch: amd64
            binary: mtga-companion-daemon-darwin-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Build binary
        working-directory: services/daemon
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: |
          VERSION="${GITHUB_REF#refs/tags/daemon/v}"
          go build -v \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o bin/${{ matrix.binary }} \
            ./cmd/daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: services/daemon/bin/${{ matrix.binary }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/daemon/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifacts
        run: |
          mkdir -p bin
          find dist/ -type f -exec mv {} bin/ \;

      - name: Generate checksums
        run: |
          cd bin
          sha256sum \
            mtga-companion-daemon-windows-amd64.exe \
            mtga-companion-daemon-darwin-arm64 \
            mtga-companion-daemon-darwin-amd64 \
            > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/mtga-companion-daemon-windows-amd64.exe
            bin/mtga-companion-daemon-darwin-arm64
            bin/mtga-companion-daemon-darwin-amd64
            bin/sha256sums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
