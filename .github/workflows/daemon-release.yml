# daemon-release.yml — Release workflow for the daemon module
#
# Responsibility: build, package, sign, and publish a GitHub Release via GoReleaser.
# Triggers on `daemon/v*` tags (e.g. daemon/v1.2.3) or manual workflow_dispatch.
#
# CI (tests on push/PR) is handled exclusively by daemon.yml.
#
# Job graph:
#   goreleaser   — runs on ubuntu-latest; tests, cross-compiles Windows targets,
#                  builds NSIS installer (via makensis), creates GitHub Release.
#                  darwin is NOT built here — see build-macos below.
#   sign-windows — runs on windows-latest; needs [goreleaser, sign-macos].
#                  Downloads the Windows .exe from the GitHub Release, signs via
#                  Azure Trusted Signing, asserts Authenticode validity,
#                  re-uploads the signed .exe, then downloads sha256sums.txt
#                  (which already contains the macOS .pkg line written by
#                  sign-macos), replaces the Windows .exe line with the
#                  post-signing hash, and re-uploads. Serialized AFTER sign-macos
#                  to avoid a --clobber race on sha256sums.txt (both jobs update
#                  the same file; last writer wins without ordering). Tag-guarded
#                  to avoid burning Azure signing quota. Separate from goreleaser
#                  because azure/trusted-signing-action requires a Windows runner.
#   build-macos  — runs on macos-latest; builds darwin/arm64 and darwin/amd64
#                  natively with CGO_ENABLED=1 (required for systray/Cocoa tray
#                  icon), runs lipo to produce a universal binary, then uploads
#                  the artifact so sign-macos can sign and notarize it.
#   sign-macos   — runs on macos-latest; downloads darwin universal binary from
#                  build-macos, code-signs, notarizes, wraps in .pkg, uploads
#                  signed artifacts to the existing GitHub Release. Tag-guarded
#                  to avoid burning Apple quota.

name: Daemon Release

on:
  push:
    tags:
      - 'daemon/v*'
  # Manual dispatch supports dry-run validation of the signing job paths.
  # Set dry_run=true to exercise the windows-latest / macos-latest runner
  # wiring and secret-presence checks WITHOUT publishing a release or burning
  # Apple / Azure signing quota.  The two dry-run jobs are separate from the
  # real sign-windows / sign-macos jobs so they have no needs-chain dependency
  # on the tag-guarded goreleaser job.  (vault-mtg-tickets#256)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate signing job wiring (runner OS + secret presence) without producing a release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  actions: write

jobs:
  goreleaser:
    name: GoReleaser (build + release)
    runs-on: ubuntu-latest
    # Guard: job-level condition ensures goreleaser only produces a release
    # artifact when triggered by a real daemon/v* tag. A workflow_dispatch run
    # (no matching tag) would produce an unsigned snapshot binary that bypasses
    # the sign-macos / sign-windows gate steps (themselves tag-guarded), so the
    # artifact would ship with no signing check and no gate failure. Blocking
    # the entire goreleaser job on non-tag runs prevents silent unsigned output.
    # Use workflow_dispatch trigger on a daemon/v* tag for signed release
    # dry-runs; for local debugging build directly via 'go build'. ADR-041 F3.
    if: startsWith(github.ref, 'refs/tags/daemon/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # GoReleaser needs full git history for changelog

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install build dependencies
        # gcc-mingw-w64-x86-64: mingw-w64 cross-compiler required for CGO_ENABLED=1
        # Windows/amd64 build. Without it, CGO falls back to the system gcc which
        # cannot produce PE (Windows) object files.  vault-mtg-tickets#199.
        run: sudo apt-get update -qq && sudo apt-get install -y nsis libayatana-appindicator3-dev gcc-mingw-w64-x86-64

      - name: Download Go dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: |
          go mod download
          # go mod download with -mod=mod may update go.work.sum with new checksums.
          # GoReleaser aborts on a dirty git state. Reset to the committed state so
          # the workspace is clean before goreleaser runs. The downloaded module cache
          # (GOPATH/pkg/mod) is unaffected by this restore.
          git restore ../../go.work.sum

      - name: Run tests (pre-release gate)
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go test -race ./...

      - name: Resolve build-time DefaultCloudAPIURL
        # Pick the cloud_api_url that goreleaser will bake into the binary via
        # `-X main.DefaultCloudAPIURL=<url>` (#2560). Pre-release tags (rc/alpha/
        # beta/pre) ship the staging URL; stable tags ship production; manual
        # workflow_dispatch on a branch defaults to staging so a snapshot build
        # is never silently aimed at prod.
        id: default_url
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == *"-rc"* || "$REF" == *"-alpha"* || "$REF" == *"-beta"* || "$REF" == *"-pre"* ]]; then
            echo "url=https://staging-api.vaultmtg.app/api/v1" >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == daemon/v* ]]; then
            echo "url=https://api.vaultmtg.app/api/v1" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch on a branch — never touch prod from a snapshot.
            echo "url=https://staging-api.vaultmtg.app/api/v1" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build-time Sentry DSN
        # Pick the Sentry DSN baked into the binary via `-X main.DefaultSentryDSN`.
        # Pre-release tags ship the staging DSN; stable tags ship the production
        # DSN; manual workflow_dispatch on a branch leaves the DSN empty so
        # snapshot builds never report against a real Sentry project. #1832.
        id: sentry_dsn
        env:
          SENTRY_DSN_DAEMON_PRODUCTION: ${{ secrets.SENTRY_DSN_DAEMON_PRODUCTION }}
          SENTRY_DSN_DAEMON_STAGING: ${{ secrets.SENTRY_DSN_DAEMON_STAGING }}
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == *"-rc"* || "$REF" == *"-alpha"* || "$REF" == *"-beta"* || "$REF" == *"-pre"* ]]; then
            DSN="$SENTRY_DSN_DAEMON_STAGING"
          elif [[ "$REF" == daemon/v* ]]; then
            DSN="$SENTRY_DSN_DAEMON_PRODUCTION"
          else
            DSN=""
          fi
          # Never echo the DSN — write it to a step output via masking. GitHub
          # Actions automatically masks values registered with add-mask.
          if [[ -n "$DSN" ]]; then
            echo "::add-mask::$DSN"
          fi
          echo "dsn=$DSN" >> "$GITHUB_OUTPUT"

      - name: Resolve semver tag for GoReleaser
        # GoReleaser v2 requires GORELEASER_CURRENT_TAG to be a parseable semver
        # string -- the prefixed form `daemon/v0.3.2-rc1` fails the internal
        # semver parser (regression introduced in PR #2185 / commit 5590f1e6;
        # see workflow run 26437135668 "failed to parse tag 'daemon/v0.3.2-rc1'
        # as semver").
        #
        # Strip the `daemon/` prefix to produce the parseable form:
        #   - SEMVER (`v0.3.2-rc1`) -> GORELEASER_CURRENT_TAG + PLAIN_VERSION
        # GoReleaser publishes the GitHub Release at the bare `v*` tag. The
        # `Rename GitHub Release to daemon/v* tag` step below restores ADR-023
        # namespacing by PATCHing the release's `tag_name` to `daemon/v*` --
        # the `release.tag` config field is GoReleaser Pro-only and is rejected
        # by free-tier (verified against v2.16.0 source).
        #
        # The local `git tag -f "${SEMVER}"` aliases the stripped semver to the
        # same commit as the pushed daemon/v* tag; this satisfies GoReleaser v2's
        # tag-to-commit alignment validation. The alias is local-only (no push),
        # so the bare `v*` tag is ephemeral to the CI job and never reaches the
        # remote, preserving the ADR-023 namespacing guarantee.
        id: semver
        run: |
          RAW="${{ github.ref_name }}"
          SEMVER="${RAW#daemon/}"
          echo "tag=${SEMVER}" >> "$GITHUB_OUTPUT"
          git tag -f "${SEMVER}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --config services/daemon/.goreleaser.yml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GITHUB_WORKSPACE: ${{ github.workspace }}
          # Stripped semver (e.g. 'v0.3.2-rc1') so GoReleaser's internal semver
          # parser succeeds. The release is renamed to the `daemon/v*` form by
          # the next step (PATCH /repos/.../releases/<id>) to restore the
          # ADR-023 namespacing.
          GORELEASER_CURRENT_TAG: ${{ steps.semver.outputs.tag }}
          # Plain semver (e.g. 'v0.3.1') used by .goreleaser.yml ldflags to embed
          # a clean version string in the binary ({{ .Env.PLAIN_VERSION }}).
          PLAIN_VERSION: ${{ steps.semver.outputs.tag }}
          # cloud_api_url baked into the binary via `-X main.DefaultCloudAPIURL=`
          # so `handleMissingConfig` never falls back to a hardcoded URL (#2560).
          DEFAULT_CLOUD_API_URL: ${{ steps.default_url.outputs.url }}
          # Sentry DSN baked into the binary via `-X main.DefaultSentryDSN=`
          # for daemon-side crash capture. Empty for snapshot builds — leaves
          # Sentry disabled at runtime per sentryhook.Init contract. #1832.
          DEFAULT_SENTRY_DSN: ${{ steps.sentry_dsn.outputs.dsn }}

      - name: Verify Windows systray symbols (CGO guard)
        # What this catches: CGO_ENABLED flipped back to 0, CC misconfigured,
        # or build-tag misrouting that selects tray_nocgo.go (//go:build !cgo)
        # instead of tray.go (//go:build cgo). vault-mtg-tickets#199.
        #
        # GoReleaser writes the binary to dist/vaultmtg-daemon_windows_amd64_v1/
        # (the path matches the "binary" field + GoReleaser's OS/arch matrix).
        # We find it by glob so the path survives future GoReleaser layout changes.
        run: |
          set -euo pipefail
          EXE=$(find dist -name 'vaultmtg-daemon.exe' | head -1)
          if [[ -z "${EXE}" ]]; then
            echo "ERROR: vaultmtg-daemon.exe not found under dist/ — GoReleaser build failed?" >&2
            find dist -type f | head -20 >&2
            exit 1
          fi
          echo "Checking systray symbols in: ${EXE}"
          if ! go tool nm "${EXE}" 2>/dev/null | grep -qi "systray"; then
            echo "ERROR: systray symbols missing from Windows binary." >&2
            echo "The no-op stub (tray_nocgo.go) was compiled instead of the real tray (tray.go)." >&2
            echo "Check CGO_ENABLED and CC in .goreleaser.yml and the apt-get step." >&2
            exit 1
          fi
          echo "PASS: systray symbols found in ${EXE}"
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg

      - name: Rename GitHub Release to daemon/v* tag (ADR-023)
        # GoReleaser publishes the release at the bare semver tag (e.g.
        # `v0.3.2-rc1`) because `ctx.Git.CurrentTag` is what drives both the
        # semver parser and the published release tag, and the free-tier
        # `release.tag` override is unavailable.
        #
        # Atomically rename `tag_name` to the prefixed `daemon/v*` form via the
        # GitHub Releases API, restoring ADR-023 namespacing. The PATCH operates
        # on the existing release ID so there is no delete/recreate race and no
        # asset re-upload.
        #
        # Skipped on workflow_dispatch (no real tag pushed; goreleaser ran in a
        # snapshot-like mode and no published release exists to rename).
        if: startsWith(github.ref, 'refs/tags/daemon/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMVER_TAG: ${{ steps.semver.outputs.tag }}
          PREFIXED_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          RELEASE_ID=$(gh api "repos/${REPO}/releases/tags/${SEMVER_TAG}" --jq .id)
          if [[ -z "${RELEASE_ID}" || "${RELEASE_ID}" == "null" ]]; then
            echo "ERROR: GoReleaser did not publish a release at tag '${SEMVER_TAG}'." >&2
            exit 1
          fi
          echo "Renaming release ${RELEASE_ID}: ${SEMVER_TAG} -> ${PREFIXED_TAG}"
          gh api \
            --method PATCH \
            "repos/${REPO}/releases/${RELEASE_ID}" \
            -f "tag_name=${PREFIXED_TAG}" \
            --jq '"renamed: \(.tag_name) at \(.html_url)"'

      - name: Delete orphan bare v* git ref
        if: startsWith(github.ref, 'refs/tags/daemon/v')
        run: |
          SEMVER="${{ steps.semver.outputs.tag }}"
          gh api --method DELETE "repos/${{ github.repository }}/git/refs/tags/${SEMVER}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert no bare v* ref reached remote (ADR-023 contract test)
        # Post-condition check: after the PATCH rename and the orphan-ref delete
        # above, no NEW bare v* ref must exist on the remote.  The two ADR-023
        # frozen legacy tags (v0.1.0, v0.3.0) predate the namespacing scheme and
        # are excluded from the check.  Any other bare v* ref means the tag-dance
        # failed — either the delete-orphan step was silently suppressed or
        # GoReleaser pushed an additional bare tag.  A bare v* ref on origin
        # triggers deploy-spa.yml (which fires on v*), corrupting the application
        # release namespace (ADR-023).
        #
        # Skipped on workflow_dispatch: no real tag is pushed in dispatch mode,
        # so there is no orphan ref to check and no risk of a spurious failure.
        if: startsWith(github.ref, 'refs/tags/daemon/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # ADR-023 frozen legacy set — these bare tags predate the namespacing
          # scheme and are intentionally preserved as historical artifacts.
          # Mirrors the allowlist in tag-namespace-fitness.yml.
          LEGACY_ALLOWED="v0.1.0 v0.3.0"

          echo "Checking remote for bare v* refs outside the ADR-023 frozen legacy set..."
          echo "Allowed legacy refs: ${LEGACY_ALLOWED}"

          STRAY_REFS=""
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            # Strip refs/tags/ prefix to get the tag name
            tag="${ref#refs/tags/}"
            # Check if this tag is in the frozen legacy set
            found=0
            for allowed in ${LEGACY_ALLOWED}; do
              if [ "$tag" = "$allowed" ]; then
                found=1
                break
              fi
            done
            if [ "$found" -eq 0 ]; then
              STRAY_REFS="${STRAY_REFS}  ${ref}"$'\n'
            fi
          done < <(git ls-remote origin 'refs/tags/v*' | awk '{print $2}' | grep -v '\^{}' || true)

          if [ -n "${STRAY_REFS}" ]; then
            echo "ERROR: bare v* ref found on remote — tag-dance failed; see ADR-023 and daemon-release.yml PATCH step." >&2
            echo "" >&2
            echo "Stray bare refs found (not in frozen legacy set):" >&2
            printf '%s' "${STRAY_REFS}" >&2
            echo "" >&2
            echo "These refs will trigger deploy-spa.yml and corrupt the application release namespace." >&2
            echo "Manual remediation: git push origin --delete <bare-tag>" >&2
            exit 1
          fi
          echo "PASS: No stray bare v* refs found on remote. ADR-023 tag-namespace invariant holds."


  sign-windows:
    name: Sign Windows .exe (Azure Trusted Signing)
    runs-on: windows-latest
    needs: [goreleaser, sign-macos]
    # Serialized after sign-macos so that when this job reads sha256sums.txt
    # from the GitHub Release, the macOS .pkg line is already present.
    # Both jobs do a read-modify-write on sha256sums.txt with --clobber; without
    # ordering the later writer silently drops the earlier job's entry.
    # Guard: tag-only — never burn Azure signing quota on snapshot/dispatch runs.
    # azure/trusted-signing-action requires a Windows runner; this job is separate
    # from goreleaser (ubuntu-latest) for exactly that reason. ADR-041 G1/P0-3.
    if: startsWith(github.ref, 'refs/tags/daemon/v')

    env:
      EXE_NAME: vaultmtg-daemon-windows-amd64.exe

    steps:
      - name: Resolve semver tag (strip daemon/ prefix)
        id: semver
        shell: bash
        run: |
          RAW="${{ github.ref_name }}"
          SEMVER="${RAW#daemon/}"
          echo "tag=${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Download Windows .exe from GitHub Release
        # GoReleaser published the release at the bare semver tag. The Rename step
        # in the goreleaser job has already moved it to daemon/v* at this point
        # (goreleaser job completed successfully before this job started).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p signed
          gh release download "${{ github.ref_name }}" \
            --pattern "${{ env.EXE_NAME }}" \
            --dir signed \
            --repo "${{ github.repository }}"
          ls -lh signed/

      - name: Sign Windows binary (Azure Trusted Signing)
        # azure/trusted-signing-action requires a Windows runner — this is why
        # signing is in its own job rather than in the goreleaser (ubuntu) job.
        # Pinned to full commit SHA per supply-chain policy (March 2026 Trivy
        # tag-hijack precedent). SHA verified against v2.0.0 annotated tag in
        # the Azure repo on 2026-05-29. ADR-011, ticket #1649.
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
          files-folder: signed/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Assert Authenticode signature on signed .exe
        # Hard-fail if Get-AuthenticodeSignature returns any status other than
        # "Valid". Guards against the signing action silently exiting zero on
        # failure (e.g. missing credentials, Azure quota exhausted). ADR-041 G1/P0-3.
        shell: pwsh
        run: |
          $exe = Get-Item "signed\${{ env.EXE_NAME }}"
          Write-Host "Checking signature on: $($exe.FullName)"
          $sig = Get-AuthenticodeSignature $exe.FullName
          if ($sig.Status -ne "Valid") {
            Write-Error "ERROR: Authenticode signature status: $($sig.Status) on $($exe.FullName)"
            exit 1
          }
          Write-Host "PASS: Authenticode signature Valid on $($exe.FullName)"

      - name: Re-upload signed .exe to GitHub Release
        # Overwrites the unsigned .exe GoReleaser originally uploaded with the
        # signed version. --clobber replaces the existing asset in-place so the
        # release asset URL is unchanged.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "signed/${{ env.EXE_NAME }}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Update Windows .exe SHA256 in sha256sums.txt
        # Azure Trusted Signing modifies the .exe bytes (embeds Authenticode data),
        # so the hash GoReleaser computed for the unsigned artifact is stale.
        # This step: downloads sha256sums.txt from the release (which already
        # contains the macOS .pkg line written by sign-macos, because sign-windows
        # runs after sign-macos via needs: [goreleaser, sign-macos]), replaces
        # only the Windows .exe line with the post-signing hash, and re-uploads.
        # The macOS line is preserved verbatim — this is a read-modify-write on
        # one line only, not a full file replacement. (Closes vault-mtg-tickets#254)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $exeName = "${{ env.EXE_NAME }}"
          $repo = "${{ github.repository }}"

          # Download the current sha256sums.txt (contains the macOS .pkg line).
          gh release download $tag `
            --pattern sha256sums.txt `
            --repo $repo

          # Compute SHA256 of the signed .exe (Windows-native, no sha256sum tool).
          $hash = (Get-FileHash "signed\$exeName" -Algorithm SHA256).Hash.ToLower()
          Write-Host "Signed .exe SHA256: $hash  $exeName"

          # Replace the Windows .exe line in-place; preserve all other lines.
          # The GoReleaser-generated line format is: "<hash>  <filename>"
          # We match on the filename suffix so the replacement is idempotent.
          $lines = Get-Content sha256sums.txt
          $newLines = $lines | ForEach-Object {
            if ($_ -match [regex]::Escape($exeName)) {
              "$hash  $exeName"
            } else {
              $_
            }
          }
          # If no line matched (e.g. GoReleaser omitted it), append a new line.
          if (-not ($lines -match [regex]::Escape($exeName))) {
            $newLines = @($newLines) + "$hash  $exeName"
          }
          $newLines | Set-Content sha256sums.txt -Encoding UTF8NoBOM

          Write-Host "=== Updated sha256sums.txt ==="
          Get-Content sha256sums.txt

          # Re-upload; --clobber replaces the version uploaded by sign-macos.
          gh release upload $tag sha256sums.txt `
            --repo $repo `
            --clobber


  build-macos:
    name: Build darwin universal binary (CGO, native macOS)
    runs-on: macos-latest
    needs: [goreleaser]
    # Run on every tag-triggered release AND on manual workflow_dispatch so
    # snapshot/dry-run builds also produce a darwin binary for local testing.
    # The goreleaser job must complete first so we know the Go version and env.

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Download Go dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Resolve semver from tag
        # Mirror the goreleaser job's semver step so PLAIN_VERSION is available
        # for the ldflags -X main.Version embed.
        id: semver
        run: |
          RAW="${{ github.ref_name }}"
          SEMVER="${RAW#daemon/}"
          echo "tag=${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Resolve build-time DefaultCloudAPIURL
        id: default_url
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == *"-rc"* || "$REF" == *"-alpha"* || "$REF" == *"-beta"* || "$REF" == *"-pre"* ]]; then
            echo "url=https://staging-api.vaultmtg.app/api/v1" >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == daemon/v* ]]; then
            echo "url=https://api.vaultmtg.app/api/v1" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://staging-api.vaultmtg.app/api/v1" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build-time Sentry DSN
        id: sentry_dsn
        env:
          SENTRY_DSN_DAEMON_PRODUCTION: ${{ secrets.SENTRY_DSN_DAEMON_PRODUCTION }}
          SENTRY_DSN_DAEMON_STAGING: ${{ secrets.SENTRY_DSN_DAEMON_STAGING }}
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == *"-rc"* || "$REF" == *"-alpha"* || "$REF" == *"-beta"* || "$REF" == *"-pre"* ]]; then
            DSN="$SENTRY_DSN_DAEMON_STAGING"
          elif [[ "$REF" == daemon/v* ]]; then
            DSN="$SENTRY_DSN_DAEMON_PRODUCTION"
          else
            DSN=""
          fi
          if [[ -n "$DSN" ]]; then
            echo "::add-mask::$DSN"
          fi
          echo "dsn=$DSN" >> "$GITHUB_OUTPUT"

      - name: Build darwin/arm64 (CGO_ENABLED=1)
        working-directory: services/daemon
        env:
          CGO_ENABLED: "1"
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build \
            -ldflags "-s -w -X main.Version=${{ steps.semver.outputs.tag }} -X main.DefaultCloudAPIURL=${{ steps.default_url.outputs.url }} -X main.DefaultSentryDSN=${{ steps.sentry_dsn.outputs.dsn }}" \
            -o /tmp/vaultmtg-daemon-arm64 \
            ./cmd/daemon

      - name: Build darwin/amd64 (CGO_ENABLED=1)
        working-directory: services/daemon
        env:
          CGO_ENABLED: "1"
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build \
            -ldflags "-s -w -X main.Version=${{ steps.semver.outputs.tag }} -X main.DefaultCloudAPIURL=${{ steps.default_url.outputs.url }} -X main.DefaultSentryDSN=${{ steps.sentry_dsn.outputs.dsn }}" \
            -o /tmp/vaultmtg-daemon-amd64 \
            ./cmd/daemon

      - name: Merge into universal binary with lipo
        run: |
          lipo -create \
            /tmp/vaultmtg-daemon-arm64 \
            /tmp/vaultmtg-daemon-amd64 \
            -output /tmp/vaultmtg-daemon
          lipo -info /tmp/vaultmtg-daemon

      - name: Verify CGO linkage (Cocoa + systray symbols)
        # What this catches: CGO_ENABLED flipped to 0 or build tag misrouting → stub ships — see ADR-041 G1/P0-2
        # Fail fast if the binary is not Cocoa-linked — this guards against a
        # future regression where CGO_ENABLED is accidentally set back to 0.
        run: |
          echo "=== otool -L (dynamic libraries) ==="
          otool -L /tmp/vaultmtg-daemon
          echo ""
          echo "=== Checking for Cocoa/AppKit linkage ==="
          if ! otool -L /tmp/vaultmtg-daemon | grep -q "Cocoa\|AppKit"; then
            echo "ERROR: darwin binary is not linked against Cocoa/AppKit — tray icon will be missing." >&2
            exit 1
          fi
          echo "PASS: Cocoa/AppKit linkage confirmed."
          echo ""
          echo "=== Checking for systray symbols ==="
          if ! nm /tmp/vaultmtg-daemon | grep -qi "systray"; then
            echo "ERROR: systray symbols missing from release binary — real tray.go not compiled in." >&2
            exit 1
          fi
          echo "PASS: systray symbols found."

      - name: Upload darwin universal binary for sign-macos
        # Artifact name matches what sign-macos expects: the container is
        # vaultmtg-daemon-darwin-universal and the file inside is vaultmtg-daemon.
        uses: actions/upload-artifact@v6
        with:
          name: vaultmtg-daemon-darwin-universal
          path: /tmp/vaultmtg-daemon
          if-no-files-found: error

  sign-macos:
    name: Sign & Notarize macOS universal binary
    runs-on: macos-latest
    needs: [goreleaser, build-macos]
    # Guard: only run when triggered by a real daemon/v* tag.
    # workflow_dispatch without a tag must not burn Apple notarization quota
    # or waste macOS runner minutes. (#1658)
    if: startsWith(github.ref, 'refs/tags/daemon/v')
    timeout-minutes: 60

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # The artifact uploaded by goreleaser contains the file 'vaultmtg-daemon'
      # (the binary name set in .goreleaser.yml builds[].binary). The artifact
      # container is named 'vaultmtg-daemon-darwin-universal' but the file inside
      # is 'vaultmtg-daemon'. BINARY must match the file name, not the artifact name.
      BINARY: vaultmtg-daemon
      PKG: vaultmtg-daemon-darwin-universal.pkg
      # DMG removed: the .dmg container was never code-signed (no Developer ID
      # Application signature on the disk image), causing Gatekeeper to reject it
      # even though the .pkg inside was signed. The .pkg is the canonical macOS
      # install artifact; the .dmg wrapper added no install-UX value and introduced
      # a Gatekeeper failure vector. The frontend Download button is being repointed
      # to the .pkg in the parallel frontend ticket.
      # ADR-022 Phase 6 (#1764) cutover 2026-05-25: legacy mtga-companion-daemon-*
      # artifact names removed. Zero downloads of legacy assets were ever recorded
      # — the dual-naming code landed AFTER the only daemon release (daemon/v0.3.1,
      # 2026-05-17), so no in-field daemon ever fetched a legacy asset.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download darwin universal binary artifact
        uses: actions/download-artifact@v8
        with:
          name: vaultmtg-daemon-darwin-universal
          path: bin/

      - name: Import Developer ID Application certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/dev-id-app.p12
          security create-keychain -p "temp-keychain-password" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security unlock-keychain -p "temp-keychain-password" build.keychain
          security set-keychain-settings -t 7200 -l build.keychain
          security import /tmp/dev-id-app.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/pkgbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "temp-keychain-password" build.keychain
          rm /tmp/dev-id-app.p12

      - name: Import Developer ID Installer certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/dev-id-installer.p12
          security import /tmp/dev-id-installer.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/productbuild
          # Include pkgbuild: in partition list so pkgbuild can access the installer key
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,pkgbuild: \
            -s -k "temp-keychain-password" build.keychain
          rm /tmp/dev-id-installer.p12

      - name: Sign macOS binary
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          chmod +x bin/${{ env.BINARY }}
          codesign \
            --force \
            --deep \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            bin/${{ env.BINARY }}
          codesign --verify --verbose bin/${{ env.BINARY }}

      - name: Resolve cloud API URL for this build
        id: cloud_url
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == *"-rc"* || "$REF" == *"-alpha"* || "$REF" == *"-beta"* || "$REF" == *"-pre"* ]]; then
            echo "url=https://staging-api.vaultmtg.app/api/v1" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://api.vaultmtg.app/api/v1" >> "$GITHUB_OUTPUT"
          fi

      - name: Create .pkg installer
        env:
          INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # rc/alpha/beta/pre tags ship the staging build, which must point at the
          # Clerk Staging instance.  Stable tags ship the production build,
          # which points at the Clerk Production instance.  The split mirrors the
          # cloud_url step above so all four placeholders track the same target.
          CLERK_FRONTEND_API_VALUE: ${{ contains(steps.cloud_url.outputs.url, 'staging-api') && 'https://clerk.stg-app.vaultmtg.app' || 'https://clerk.vaultmtg.app' }}
          CLERK_PUBLISHABLE_KEY_VALUE: ${{ contains(steps.cloud_url.outputs.url, 'staging-api') && 'pk_live_Y2xlcmsuc3RnLWFwcC52YXVsdG10Zy5hcHAk' || vars.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_OAUTH_CLIENT_ID_VALUE: ${{ contains(steps.cloud_url.outputs.url, 'staging-api') && secrets.CLERK_STAGING_OAUTH_CLIENT_ID || secrets.CLERK_OAUTH_CLIENT_ID }}
          VAULTMTG_CLOUD_API_URL_VALUE: ${{ steps.cloud_url.outputs.url }}
        run: |
          mkdir -p pkg-root/usr/local/bin
          cp bin/${{ env.BINARY }} pkg-root/usr/local/bin/vaultmtg-daemon

          # pkgbuild does not propagate env vars to the installed postinstall.
          # Substitute placeholders in a copy of the script BEFORE bundling.
          SCRIPTS_DIR=$(mktemp -d)
          cp -r services/daemon/install/macos/pkg/. "$SCRIPTS_DIR/"

          # Escape sed replacement metacharacters (\, &) and the | delimiter so
          # values with special chars (e.g. a future Clerk client_id) don't
          # silently corrupt the substitution.
          escape_sed() {
            printf '%s' "$1" | sed -e 's/[\&|]/\\&/g'
          }
          ESC_CLOUD_API_URL=$(escape_sed "$VAULTMTG_CLOUD_API_URL_VALUE")
          ESC_CLERK_FRONTEND_API=$(escape_sed "$CLERK_FRONTEND_API_VALUE")
          ESC_CLERK_PUBLISHABLE_KEY=$(escape_sed "$CLERK_PUBLISHABLE_KEY_VALUE")
          ESC_CLERK_OAUTH_CLIENT_ID=$(escape_sed "$CLERK_OAUTH_CLIENT_ID_VALUE")

          sed -i.bak \
            -e "s|__VAULTMTG_CLOUD_API_URL__|$ESC_CLOUD_API_URL|g" \
            -e "s|__CLERK_FRONTEND_API__|$ESC_CLERK_FRONTEND_API|g" \
            -e "s|__CLERK_PUBLISHABLE_KEY__|$ESC_CLERK_PUBLISHABLE_KEY|g" \
            -e "s|__CLERK_OAUTH_CLIENT_ID__|$ESC_CLERK_OAUTH_CLIENT_ID|g" \
            "$SCRIPTS_DIR/postinstall"
          rm -f "$SCRIPTS_DIR/postinstall.bak"

          # Sanity check: confirm no placeholders survived the substitution.
          if grep -q '__[A-Z_]*__' "$SCRIPTS_DIR/postinstall"; then
            echo "ERROR: postinstall still contains unsubstituted placeholders:" >&2
            grep -n '__[A-Z_]*__' "$SCRIPTS_DIR/postinstall" >&2
            exit 1
          fi

          # ------------------------------------------------------------------
          # Build and sign the VaultMTG.app launcher bundle (ADR-036 I-8, #278).
          # The .app is a thin shell-script launcher placed in /Applications.
          # It must be codesigned with Developer ID Application (SIGNING_IDENTITY)
          # before pkgbuild embeds it in the .pkg, so the bundle passes Gatekeeper
          # when the installer places it on the user's system.
          # ------------------------------------------------------------------
          APP_BUNDLE="pkg-root/Applications/VaultMTG.app"
          APP_MACOS="${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "${APP_MACOS}"

          # Info.plist — sourced from the static file in the repo to avoid
          # embedding XML heredocs in YAML (actionlint SC syntax-check failure).
          cp services/daemon/install/macos/pkg/app-Info.plist \
            "${APP_BUNDLE}/Contents/Info.plist"

          # Launcher shell script (CFBundleExecutable) — sourced from the
          # static file in the repo for the same reason as Info.plist above.
          cp services/daemon/install/macos/pkg/app-launcher \
            "${APP_MACOS}/vaultmtg-launcher"
          chmod 755 "${APP_MACOS}/vaultmtg-launcher"

          # Sign the .app bundle with Developer ID Application before pkgbuild
          # embeds it. pkgbuild wraps the already-signed bundle; the outer .pkg
          # receives the Developer ID Installer signature separately.
          codesign \
            --force \
            --deep \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "${APP_BUNDLE}"
          codesign --verify --verbose "${APP_BUNDLE}"
          echo "PASS: VaultMTG.app signed."

          pkgbuild \
            --root pkg-root \
            --scripts "$SCRIPTS_DIR" \
            --identifier com.vaultmtg.daemon \
            --version "${GITHUB_REF#refs/tags/daemon/v}" \
            --install-location / \
            --sign "$INSTALLER_IDENTITY" \
            --timestamp \
            ${{ env.PKG }}

      - name: Notarize .pkg
        # Submit the .pkg directly to notarytool so it receives its own notarization
        # ticket independent of any container format. --wait blocks until Apple
        # returns an Accepted or Invalid status; the step fails fast on rejection.
        #
        # Fix 2: previously only the .dmg was submitted, so the .pkg had no
        # registered ticket and would fail `spctl -a -t install` on offline machines
        # or on any system where Gatekeeper cannot reach the Apple OCSP/notarization
        # CDN in time.
        env:
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool submit ${{ env.PKG }} \
            --apple-id "${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}" \
            --team-id "${{ env.APPLE_TEAM_ID }}" \
            --password "$APPLE_NOTARIZATION_PASSWORD" \
            --wait

      - name: Staple notarization ticket to .pkg
        # Staple the ticket returned above onto the .pkg so the ticket travels with
        # the file. Without stapling, Gatekeeper must perform a live network check
        # against Apple's CDN on every install — offline or CDN-delayed installs
        # block or show an unverified warning.
        #
        # Fix 1: the original workflow stapled only the .dmg; the .pkg was never
        # stapled, so `xcrun stapler validate vaultmtg-daemon-darwin-universal.pkg`
        # would return "The file ... does not have a ticket stapled to it."
        run: xcrun stapler staple ${{ env.PKG }}

      - name: Validate staple on .pkg
        # What this catches: staple ran but the notarization ticket is not actually
        # present on the artifact - the staple step exiting zero does not guarantee
        # the ticket was written. A missing or corrupt ticket causes Gatekeeper to
        # require a live Apple OCSP check; on offline machines the install is
        # blocked. This step proves the ticket is stapled - see ADR-041 G1/P0-3.
        run: |
          xcrun stapler validate "${{ env.PKG }}"
          echo "PASS: staple validated on ${{ env.PKG }}"

      - name: Assert Gatekeeper acceptance of .pkg
        # What this catches: staple or Gatekeeper rejection of the final .pkg -
        # e.g. wrong entitlements, mismatched certificate, or a notarization
        # ticket that passed but Gatekeeper still rejects due to policy. The
        # historical .dmg-vs-.pkg gap was exactly this failure mode: an
        # intermediate step succeeded while the final artifact was rejected.
        # Hard-fail on BOTH non-zero spctl exit AND missing "accepted" string.
        # PIPESTATUS[0] captures spctl's own exit code before the pipe to tee
        # can mask it (a plain `| tee` takes the last command's exit, i.e. tee's,
        # which is always 0 even when spctl rejects). See ADR-041 G1/P0-3.
        run: |
          spctl -a -t install -vvv "${{ env.PKG }}" 2>&1 | tee /tmp/spctl-output.txt
          spctl_exit=${PIPESTATUS[0]}
          if [ "$spctl_exit" -ne 0 ]; then
            echo "ERROR: Gatekeeper rejected ${{ env.PKG }} (spctl exit $spctl_exit)" >&2
            cat /tmp/spctl-output.txt >&2
            exit 1
          fi
          if ! grep -q "accepted" /tmp/spctl-output.txt; then
            echo "ERROR: spctl did not report accepted for ${{ env.PKG }}" >&2
            cat /tmp/spctl-output.txt >&2
            exit 1
          fi
          echo "PASS: Gatekeeper accepted ${{ env.PKG }}"

      - name: Clean up temporary keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

      - name: Upload signed macOS artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the full daemon/v* tag so assets land on the correctly-namespaced
          # release, not a bare v* tag that squats the application release namespace.
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            "${{ env.PKG }}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Append .pkg SHA256 checksum to release sha256sums.txt
        # GoReleaser's checksum job runs on ubuntu-latest and covers only the
        # artifacts it builds (Windows NSIS .exe). The macOS .pkg is created and
        # uploaded by sign-macos after GoReleaser runs, so it is never included
        # in GoReleaser's sha256sums.txt. This step downloads the existing
        # sha256sums.txt, appends the .pkg hash, and re-uploads the file so
        # macOS users can verify their download. (ADR-041, ticket #226)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Download the GoReleaser-generated sha256sums.txt from the release.
          gh release download "$TAG" \
            --pattern sha256sums.txt \
            --repo "${{ github.repository }}"
          # Append the .pkg line: <hex-hash>  <filename>
          # Use 'shasum -a 256' (macOS) — 'sha256sum' is not on macOS runners.
          echo "$(shasum -a 256 "${{ env.PKG }}" | awk '{print $1}')  ${{ env.PKG }}" \
            >> sha256sums.txt
          # Re-upload; --clobber replaces the GoReleaser-generated version.
          gh release upload "$TAG" sha256sums.txt \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Update staging VITE_DAEMON_VERSION and redeploy
        # Only auto-update staging for pre-release tags (rc, alpha, beta, pre).
        # Stable releases (e.g. daemon/v0.3.1) go through a manual promotion so
        # production download links are never updated without explicit intent.
        if: |
          contains(github.ref_name, '-rc') ||
          contains(github.ref_name, '-alpha') ||
          contains(github.ref_name, '-beta') ||
          contains(github.ref_name, '-pre')
        env:
          # GH_VARIABLES_PAT must be a fine-grained PAT with
          # "Variables: Read and write" permission for this repository.
          # The default GITHUB_TOKEN cannot write environment variables.
          GH_TOKEN: ${{ secrets.GH_VARIABLES_PAT }}
        run: |
          # Use the full daemon/v* tag so the frontend builds correct download URLs.
          # The GitHub Release now lives at the daemon/v* tag, so VITE_DAEMON_VERSION
          # must match that tag for release asset URLs to resolve.
          gh variable set VITE_DAEMON_VERSION \
            --env staging \
            --body "${{ github.ref_name }}" \
            --repo "${{ github.repository }}"
          gh workflow run deploy-spa-staging.yml \
            --ref main \
            --repo "${{ github.repository }}"


  # ---------------------------------------------------------------------------
  # DRY-RUN JOBS (vault-mtg-tickets#256)
  #
  # These jobs run ONLY on workflow_dispatch with dry_run=true.  They exercise
  # the runner-OS assignment and secret-presence checks for the two signing
  # paths that are otherwise tag-guarded and would only surface failures on a
  # real release cut.  They do NOT invoke azure/trusted-signing-action, import
  # any keychain, call codesign/notarytool, download Release assets, or produce
  # any artifact.  They are additive and have no effect on the tag-triggered
  # release path.
  # ---------------------------------------------------------------------------

  dry-run-sign-windows:
    name: 'DRY-RUN: Validate Windows signing wiring (runner + secrets)'
    runs-on: windows-latest
    # Only run on manual dispatch with dry_run=true.  Never runs on tag push.
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true

    steps:
      - name: Assert runner OS is Windows
        # Confirms that runs-on: windows-latest resolved to a Windows runner.
        # If GitHub ever changes the label mapping this step will fail fast
        # rather than silently running the Azure action on the wrong OS.
        shell: pwsh
        run: |
          Write-Host "Runner OS: $env:RUNNER_OS"
          if ($env:RUNNER_OS -ne "Windows") {
            Write-Error "ERROR: Expected Windows runner, got: $env:RUNNER_OS"
            exit 1
          }
          Write-Host "PASS: Runner OS is Windows"

      - name: Assert Azure Trusted Signing secrets are present
        # Fails closed if any of the five required Azure secrets are missing.
        # Matches the failure class surfaced in incident I-14 (daemon/v0.3.4):
        # sign-windows exited non-zero because AZURE_TENANT_ID et al. were not
        # configured in the repo.  This step surfaces that failure on a
        # workflow_dispatch dry-run instead of on a real release tag.
        # vault-mtg-tickets#256, ADR-041 G1/P0-3.
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_CERTIFICATE_PROFILE: ${{ secrets.AZURE_CERTIFICATE_PROFILE }}
        run: |
          $missing = @()
          if ([string]::IsNullOrEmpty($env:AZURE_TENANT_ID))             { $missing += "AZURE_TENANT_ID" }
          if ([string]::IsNullOrEmpty($env:AZURE_CLIENT_ID))             { $missing += "AZURE_CLIENT_ID" }
          if ([string]::IsNullOrEmpty($env:AZURE_CLIENT_SECRET))         { $missing += "AZURE_CLIENT_SECRET" }
          if ([string]::IsNullOrEmpty($env:AZURE_TRUSTED_SIGNING_ACCOUNT)) { $missing += "AZURE_TRUSTED_SIGNING_ACCOUNT" }
          if ([string]::IsNullOrEmpty($env:AZURE_CERTIFICATE_PROFILE))   { $missing += "AZURE_CERTIFICATE_PROFILE" }
          if ($missing.Count -gt 0) {
            Write-Error "ERROR: Missing Azure Trusted Signing secrets: $($missing -join ', ')"
            Write-Error "Configure these secrets in the repo before cutting a signed release."
            exit 1
          }
          Write-Host "PASS: All 5 Azure Trusted Signing secrets are present"


  dry-run-sign-macos:
    name: 'DRY-RUN: Validate macOS signing wiring (runner + secrets)'
    runs-on: macos-latest
    # Only run on manual dispatch with dry_run=true.  Never runs on tag push.
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true

    steps:
      - name: Assert runner OS is macOS
        # Confirms that runs-on: macos-latest resolved to a macOS runner.
        run: |
          echo "Runner OS: ${RUNNER_OS}"
          if [[ "${RUNNER_OS}" != "macOS" ]]; then
            echo "ERROR: Expected macOS runner, got: ${RUNNER_OS}" >&2
            exit 1
          fi
          echo "PASS: Runner OS is macOS"

      - name: Assert Apple signing secrets are present
        # Fails closed if any of the eight required Apple signing secrets are
        # missing.  Guards against the same silent-skip failure class that
        # tag-guarding creates: a misconfigured repo would only surface on a
        # real notarization attempt.  vault-mtg-tickets#256.
        env:
          APPLE_DEVELOPER_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE }}
          APPLE_DEVELOPER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          missing=()
          [[ -z "${APPLE_DEVELOPER_CERTIFICATE}"          ]] && missing+=("APPLE_DEVELOPER_CERTIFICATE")
          [[ -z "${APPLE_DEVELOPER_CERTIFICATE_PASSWORD}" ]] && missing+=("APPLE_DEVELOPER_CERTIFICATE_PASSWORD")
          [[ -z "${APPLE_INSTALLER_CERTIFICATE}"          ]] && missing+=("APPLE_INSTALLER_CERTIFICATE")
          [[ -z "${APPLE_INSTALLER_CERTIFICATE_PASSWORD}" ]] && missing+=("APPLE_INSTALLER_CERTIFICATE_PASSWORD")
          [[ -z "${APPLE_SIGNING_IDENTITY}"               ]] && missing+=("APPLE_SIGNING_IDENTITY")
          [[ -z "${APPLE_TEAM_ID}"                        ]] && missing+=("APPLE_TEAM_ID")
          [[ -z "${APPLE_NOTARIZATION_APPLE_ID}"          ]] && missing+=("APPLE_NOTARIZATION_APPLE_ID")
          [[ -z "${APPLE_NOTARIZATION_PASSWORD}"          ]] && missing+=("APPLE_NOTARIZATION_PASSWORD")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "ERROR: Missing Apple signing secrets: ${missing[*]}" >&2
            echo "Configure these secrets in the repo before cutting a signed release." >&2
            exit 1
          fi
          echo "PASS: All 8 Apple signing secrets are present"
