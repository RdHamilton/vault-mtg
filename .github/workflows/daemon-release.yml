# daemon-release.yml — Release workflow for the daemon module
#
# Responsibility: cross-compile release binaries and publish a GitHub Release.
# Triggers on `daemon/v*` tags (e.g. daemon/v1.2.3) or manual workflow_dispatch.
#
# CI (tests on push/PR) is handled exclusively by daemon.yml.
#
# Binary naming convention: mtga-companion-daemon-<os>-<arch>[.exe]
# Local `make build` must produce the same base names (see services/daemon/Makefile).

name: Daemon Release

on:
  push:
    tags:
      - 'daemon/v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    # Run tests first so a broken build never produces a release artifact.
    name: Daemon Tests (pre-release gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Run tests
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go test -race ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [test]

    strategy:
      fail-fast: false
      # Targets: Windows (amd64), macOS (amd64 + arm64).
      # Linux desktop daemon is out of scope -- the daemon is a consumer app for Windows/macOS only.
      # To add Linux, append {goos: linux, goarch: amd64} to the matrix below.
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: mtga-companion-daemon-windows-amd64.exe
          - goos: darwin
            goarch: arm64
            binary: mtga-companion-daemon-darwin-arm64
          - goos: darwin
            goarch: amd64
            binary: mtga-companion-daemon-darwin-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Build binary
        working-directory: services/daemon
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: |
          VERSION="${GITHUB_REF#refs/tags/daemon/v}"
          go build -v \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o bin/${{ matrix.binary }} \
            ./cmd/daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: services/daemon/bin/${{ matrix.binary }}

  sign-macos:
    name: Sign & Notarize macOS (${{ matrix.goarch }})
    runs-on: macos-latest
    needs: [build]

    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm64
            binary: mtga-companion-daemon-darwin-arm64
            dmg: mtga-companion-daemon-darwin-arm64.dmg
            pkg: mtga-companion-daemon-darwin-arm64.pkg
          - goarch: amd64
            binary: mtga-companion-daemon-darwin-amd64
            dmg: mtga-companion-daemon-darwin-amd64.dmg
            pkg: mtga-companion-daemon-darwin-amd64.pkg

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Download macOS binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: bin/

      - name: Import Developer ID Application certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/dev-id-app.p12
          security create-keychain -p "temp-keychain-password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp-keychain-password" build.keychain
          security set-keychain-settings -t 7200 -l build.keychain
          security import /tmp/dev-id-app.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/pkgbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "temp-keychain-password" build.keychain
          rm /tmp/dev-id-app.p12

      - name: Import Developer ID Installer certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/dev-id-installer.p12
          security import /tmp/dev-id-installer.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "temp-keychain-password" build.keychain
          rm /tmp/dev-id-installer.p12

      - name: Sign macOS binary
        run: |
          chmod +x bin/${{ matrix.binary }}
          codesign \
            --force \
            --deep \
            --options runtime \
            --sign "Developer ID Application: ${{ env.APPLE_TEAM_ID }}" \
            --timestamp \
            bin/${{ matrix.binary }}
          codesign --verify --verbose bin/${{ matrix.binary }}

      - name: Create .pkg installer
        run: |
          mkdir -p pkg-root/usr/local/bin
          cp bin/${{ matrix.binary }} pkg-root/usr/local/bin/mtga-companion-daemon
          pkgbuild \
            --root pkg-root \
            --identifier com.vaultmtg.daemon \
            --version "${GITHUB_REF#refs/tags/daemon/v}" \
            --install-location / \
            --sign "Developer ID Installer: ${{ env.APPLE_TEAM_ID }}" \
            --timestamp \
            ${{ matrix.pkg }}

      - name: Wrap .pkg in .dmg
        run: |
          mkdir -p dmg-staging
          cp ${{ matrix.pkg }} dmg-staging/
          hdiutil create \
            -volname "MTGA Companion Daemon" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            ${{ matrix.dmg }}

      - name: Notarize .dmg
        env:
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool submit ${{ matrix.dmg }} \
            --apple-id ray.hamilton@stablekernel.com \
            --team-id "${{ env.APPLE_TEAM_ID }}" \
            --password "$APPLE_NOTARIZATION_PASSWORD" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple ${{ matrix.dmg }}

      - name: Clean up temporary keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

      - name: Upload signed .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.dmg }}
          path: ${{ matrix.dmg }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, sign-macos]
    if: startsWith(github.ref, 'refs/tags/daemon/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifacts
        run: |
          mkdir -p bin
          find dist/ -type f -exec mv {} bin/ \;

      - name: Generate checksums
        run: |
          cd bin
          sha256sum \
            mtga-companion-daemon-windows-amd64.exe \
            mtga-companion-daemon-darwin-arm64.dmg \
            mtga-companion-daemon-darwin-amd64.dmg \
            > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/mtga-companion-daemon-windows-amd64.exe
            bin/mtga-companion-daemon-darwin-arm64.dmg
            bin/mtga-companion-daemon-darwin-amd64.dmg
            bin/sha256sums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
