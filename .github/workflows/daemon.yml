# daemon.yml — CI workflow for the daemon module
#
# Responsibility: run tests on every push and pull-request that touches
# daemon or contract source files.  It does NOT build release artifacts.
#
# Release artifacts (cross-compiled binaries + GitHub Release) are handled
# exclusively by daemon-release.yml, which triggers on `daemon/v*` tags.
#
# Binary naming: canonical artifact names are `mtga-companion-daemon-<os>-<arch>[.exe]`
# as defined in daemon-release.yml.  Any local `make build` output must match.

name: Daemon CI

on:
  push:
    branches: [main]
    paths:
      - 'services/daemon/**'
      - 'services/contract/**'
      - '.github/workflows/daemon.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/daemon/**'
      - 'services/contract/**'
      - '.github/workflows/daemon.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: Daemon Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Run tests
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./services/daemon/coverage.out
          flags: daemon
          fail_ci_if_error: false
