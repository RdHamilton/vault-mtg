name: Daemon

on:
  push:
    branches: [main]
    tags:
      - 'release-*'
    paths:
      - 'services/daemon/**'
      - 'services/contract/**'
      - '.github/workflows/daemon.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/daemon/**'
      - 'services/contract/**'
      - '.github/workflows/daemon.yml'

permissions:
  contents: write

jobs:
  test:
    name: Daemon Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Run tests
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./services/daemon/coverage.out
          flags: daemon
          fail_ci_if_error: false

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [test]

    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: mtga-daemon-windows-amd64.exe
          - goos: darwin
            goarch: arm64
            binary: mtga-daemon-darwin-arm64
          - goos: darwin
            goarch: amd64
            binary: mtga-daemon-darwin-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Build binary
        working-directory: services/daemon
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: |
          go build -v \
            -ldflags="-s -w" \
            -o bin/${{ matrix.binary }} \
            ./cmd/daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: services/daemon/bin/${{ matrix.binary }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/release-')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Flatten artifacts
        run: |
          mkdir -p bin
          find dist/ -type f -exec mv {} bin/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/mtga-daemon-windows-amd64.exe
            bin/mtga-daemon-darwin-arm64
            bin/mtga-daemon-darwin-amd64
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
