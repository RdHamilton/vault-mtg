# daemon.yml — CI workflow for the daemon module
#
# Responsibility: run tests on every push and pull-request that touches
# daemon or contract source files.  It does NOT build release artifacts.
#
# Release artifacts (cross-compiled binaries + GitHub Release) are handled
# exclusively by daemon-release.yml, which triggers on `daemon/v*` tags.
#
# Binary naming: canonical artifact names are `vaultmtg-daemon-<os>-<arch>[.exe]`
# as defined in daemon-release.yml. ADR-022 Phase 6 (#1764) cutover 2026-05-25
# removed the legacy mtga-companion-daemon-* dual-naming. Any local
# `make build` output must match the canonical (new) names.

name: Daemon CI

on:
  push:
    branches: [main]
    paths:
      - 'services/daemon/**'
      - 'services/contract/**'
      - 'pkg/logparse/**'
      - '.github/workflows/daemon.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/daemon/**'
      - 'services/contract/**'
      - 'pkg/logparse/**'
      - 'services/daemon/install/**'
      - '.github/workflows/daemon.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: Daemon Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/daemon/go.sum
            pkg/logparse/go.sum

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install systray system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libayatana-appindicator3-dev

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Run tests
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./services/daemon/coverage.out
          flags: daemon
          fail_ci_if_error: false

      # ADR-042 Layer 2: contract/serialisation gate.
      # Runs the TestContractEmit_* suite which round-trips every event class
      # through the real parsers + dispatch.BuildEvent and validates payload
      # shapes against the committed corpus fixtures.
      # continue-on-error: true per RULE-INFRA-01 (soft-fail until two green
      # main runs). Flipped to hard-fail by vault-mtg-tickets#249.
      - name: Contract/serialisation gate (ADR-042 Layer 2)
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        continue-on-error: true
        run: go test -v -run TestContractEmit ./internal/logreader/...

      # Run services/contract tests — the contract package has no dependencies on the daemon
      # module, so it is tested independently to catch marshal/unmarshal regressions (#2089).
      - name: Run contract tests
        working-directory: services/contract
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload contract coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./services/contract/coverage.out
          flags: contract
          fail_ci_if_error: false

      # Run pkg/logparse tests — this package was extracted from services/daemon/internal/logreader
      # and must be validated whenever daemon or logparse files change (#1524).
      - name: Download pkg/logparse dependencies
        working-directory: pkg/logparse
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Run pkg/logparse tests
        working-directory: pkg/logparse
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload pkg/logparse coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./pkg/logparse/coverage.out
          flags: logparse
          fail_ci_if_error: false

  integration-smoke:
    name: Daemon Binary Smoke Test
    # Run on macOS so the systray dependency (Cocoa) initialises correctly and
    # the OS keychain is available without additional display setup.
    runs-on: macos-latest
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/daemon/go.sum

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Build daemon binary (smoke pre-check)
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go build ./cmd/daemon

      - name: Binary-contract check (CGO/Cocoa/systray) — PR gate
        # What this catches: CGO_ENABLED flipped to 0 or build tag misrouting → stub ships — see ADR-041 G1/P0-2
        working-directory: services/daemon
        env:
          CGO_ENABLED: "1"
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: |
          # What this catches: CGO_ENABLED flipped to 0 or !cgo stub ships — see ADR-041 G1/P0-2
          BINARY=./vaultmtg-daemon-pr-check
          go build -o "$BINARY" ./cmd/daemon
          echo "=== otool -L ==="
          otool -L "$BINARY"
          if ! otool -L "$BINARY" | grep -q "Cocoa\|AppKit"; then
            echo "ERROR: binary not linked against Cocoa/AppKit — CGO regression." >&2
            exit 1
          fi
          echo "PASS: Cocoa/AppKit linkage confirmed."
          echo "=== systray symbols ==="
          if ! nm "$BINARY" | grep -qi "systray"; then
            echo "ERROR: systray symbols missing — real tray.go not compiled in." >&2
            exit 1
          fi
          echo "PASS: systray symbols found."

      - name: Run integration smoke test
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          MTGA_DAEMON_HEADLESS: "1"
        run: go test -v -race -tags integration -run TestDaemonBinarySmoke -timeout 5m ./internal/daemon/...

      # ---------------------------------------------------------------------------
      # CGO tray smoke — exercises the real cgo tray.go (//go:build cgo) instead
      # of the !cgo stub. Catches regressions where CGO_ENABLED=0 silently selects
      # the no-op stub and ships a tray-less binary (see ADR-041 G2, ticket #220).
      #
      # Binary-contract check (#221) added above: otool -L and nm run against a
      # fresh CGO=1 build, hard-failing on missing Cocoa/AppKit linkage or absent
      # systray symbols.
      # ---------------------------------------------------------------------------
      - name: Run tray CGO test (real cgo tray.go)
        # What this catches: tray_test.go exercising the !cgo stub — see ADR-041 G2
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          CGO_ENABLED: "1"
        run: go test -v -race -tags cgo -run TestTrayCGO ./internal/tray/...

  macos-install-test:
    name: macOS Install Script Tests
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install bats-core
        run: brew install bats-core

      - name: Run install script tests
        run: |
          bats services/daemon/install/macos/install_test.bats
          bats services/daemon/install/macos/uninstall_test.bats
          bats services/daemon/install/macos/pkg/postinstall_test.bats

  # ---------------------------------------------------------------------------
  # Gate — all daemon checks must pass before merge (#40)
  # ---------------------------------------------------------------------------
  # Why this exists:
  #   A single required status check at the branch protection level needs a stable
  #   job name to key off.  This gate job depends on every daemon CI job in this
  #   workflow; set "Daemon CI / Gate" as the required check in branch protection.
  #
  #   Cross-workflow gate: the macOS install lifecycle (install-lifecycle-macos)
  #   runs in daemon-install-lifecycle.yml on a separate macos-latest runner.
  #   GitHub Actions does not support cross-workflow `needs:` dependencies, so
  #   that job is wired as a second required branch-protection status check:
  #   "Daemon Install Lifecycle / macOS — Install Lifecycle (fresh install / reinstall / uninstall)"
  #   Both status checks must be green before any daemon PR can merge. (#40 AC6)
  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs: [test, integration-smoke, macos-install-test]
    if: always()
    steps:
      - name: Check all daemon jobs passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "FAIL: 'test' job did not succeed (result: ${{ needs.test.result }})"
            exit 1
          fi
          if [[ "${{ needs.integration-smoke.result }}" != "success" ]]; then
            echo "FAIL: 'integration-smoke' job did not succeed (result: ${{ needs.integration-smoke.result }})"
            exit 1
          fi
          if [[ "${{ needs.macos-install-test.result }}" != "success" ]]; then
            echo "FAIL: 'macos-install-test' job did not succeed (result: ${{ needs.macos-install-test.result }})"
            exit 1
          fi
          echo "PASS: all daemon CI jobs succeeded"
