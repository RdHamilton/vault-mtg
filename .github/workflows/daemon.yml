# daemon.yml — CI workflow for the daemon module
#
# Responsibility: run tests on every push and pull-request that touches
# daemon or contract source files.  It does NOT build release artifacts.
#
# Release artifacts (cross-compiled binaries + GitHub Release) are handled
# exclusively by daemon-release.yml, which triggers on `daemon/v*` tags.
#
# Binary naming: canonical artifact names are `vaultmtg-daemon-<os>-<arch>[.exe]`
# as defined in daemon-release.yml.  During the ADR-022 Phase 2 dual-naming
# window, legacy `mtga-companion-daemon-*` copies are also published.
# Any local `make build` output must match the canonical (new) names.

name: Daemon CI

on:
  push:
    branches: [main]
    paths:
      - 'services/daemon/**'
      - 'services/contract/**'
      - 'pkg/logparse/**'
      - '.github/workflows/daemon.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/daemon/**'
      - 'services/contract/**'
      - 'pkg/logparse/**'
      - 'services/daemon/install/**'
      - '.github/workflows/daemon.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: Daemon Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/daemon/go.sum
            pkg/logparse/go.sum

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install systray system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libayatana-appindicator3-dev

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Run tests
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./services/daemon/coverage.out
          flags: daemon
          fail_ci_if_error: false

      # Run services/contract tests — the contract package has no dependencies on the daemon
      # module, so it is tested independently to catch marshal/unmarshal regressions (#2089).
      - name: Run contract tests
        working-directory: services/contract
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload contract coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./services/contract/coverage.out
          flags: contract
          fail_ci_if_error: false

      # Run pkg/logparse tests — this package was extracted from services/daemon/internal/logreader
      # and must be validated whenever daemon or logparse files change (#1524).
      - name: Download pkg/logparse dependencies
        working-directory: pkg/logparse
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Run pkg/logparse tests
        working-directory: pkg/logparse
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload pkg/logparse coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./pkg/logparse/coverage.out
          flags: logparse
          fail_ci_if_error: false

  integration-smoke:
    name: Daemon Binary Smoke Test
    # Run on macOS so the systray dependency (Cocoa) initialises correctly and
    # the OS keychain is available without additional display setup.
    runs-on: macos-latest
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            services/daemon/go.sum

      - name: Configure private module access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Build daemon binary (smoke pre-check)
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go build ./cmd/daemon

      - name: Run integration smoke test
        working-directory: services/daemon
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          MTGA_DAEMON_HEADLESS: "1"
        run: go test -v -race -tags integration -run TestDaemonBinarySmoke -timeout 5m ./internal/daemon/...

  macos-install-test:
    name: macOS Install Script Tests
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install bats-core
        run: brew install bats-core

      - name: Run install script tests
        run: |
          bats services/daemon/install/macos/install_test.bats
          bats services/daemon/install/macos/pkg/postinstall_test.bats
