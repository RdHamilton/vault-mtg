name: Sync Service CI

on:
  push:
    branches: [main]
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'
  pull_request:
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'

# NOTE: This workflow does NOT deploy the sync Lambda. The canonical deploy
# path is `mtga-companion-infra/.github/workflows/deploy-sync-lambda.yml`,
# which builds arm64 (matching the Lambda runtime) and holds a concurrency
# lock. See `vault-mtg-docs/engineering/architecture/decisions/` for the
# canonical-deploy-path decision note.

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sync
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: services/sync/go.mod

      - name: Download dependencies
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Build
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go build ./...

      - name: Build Lambda binary (smoke check, arm64 — no deploy)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: |
          go build -tags lambda.norpc -trimpath -o /tmp/bootstrap ./cmd/lambda
          echo "Smoke-built Lambda bootstrap: $(ls -lh /tmp/bootstrap)"

      - name: Test
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go test -race ./...

      - name: Vet
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
        run: go vet ./...

  integration-test:
    name: Integration Test (Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sync
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sync_test
          POSTGRES_PASSWORD: sync_test
          POSTGRES_DB: sync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/sync/go.mod

      - name: Download dependencies
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Apply test schema
        env:
          PGPASSWORD: sync_test
        run: |
          psql -h localhost -U sync_test -d sync_test -f testdata/schema.sql

      - name: Run integration tests
        env:
          GONOSUMDB: github.com/RdHamilton/vault-mtg
          GOPRIVATE: github.com/RdHamilton/vault-mtg
          TEST_DATABASE_URL: postgres://sync_test:sync_test@localhost:5432/sync_test
        run: go test -race -tags integration ./...
