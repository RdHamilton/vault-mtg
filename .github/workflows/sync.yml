name: Sync Service CI

on:
  push:
    branches: [main]
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'
  pull_request:
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sync
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/sync/go.mod

      - name: Download dependencies
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Build
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go build ./...

      - name: Build Lambda binary (bootstrap)
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: GOOS=linux GOARCH=amd64 go build -o bootstrap ./cmd/lambda/main.go

      - name: Test
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go test -race ./...

      - name: Vet
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go vet ./...

  deploy-lambda:
    name: Deploy Sync Lambda
    runs-on: ubuntu-latest
    needs: [build-and-test]
    # Only deploy on push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    permissions:
      contents: read
      id-token: write  # required for OIDC-based AWS auth

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/sync/go.mod

      - name: Build Lambda bootstrap binary
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: |
          cd services/sync
          GOOS=linux GOARCH=amd64 go build -o bootstrap ./cmd/lambda/main.go
          zip sync-lambda.zip bootstrap

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name mtga-sync \
            --zip-file fileb://services/sync/sync-lambda.zip \
            --region us-east-1
          aws lambda wait function-updated \
            --function-name mtga-sync \
            --region us-east-1
          echo "Lambda deploy complete: ${{ github.sha }}"
