name: Sync Service CI

on:
  push:
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'
  pull_request:
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sync
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/sync/go.mod

      - name: Download dependencies
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Build
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go build ./...

      - name: Test
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go test -race ./...

      - name: Vet
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go vet ./...
