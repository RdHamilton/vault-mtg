name: Sync Service CI

on:
  push:
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'
  pull_request:
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/sync/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
