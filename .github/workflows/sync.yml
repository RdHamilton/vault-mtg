name: Sync Service CI

on:
  push:
    branches: [main]
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'
  pull_request:
    paths:
      - 'services/sync/**'
      - '.github/workflows/sync.yml'

# NOTE: This workflow does NOT deploy the sync Lambda. The canonical deploy
# path is `mtga-companion-infra/.github/workflows/deploy-sync-lambda.yml`,
# which builds arm64 (matching the Lambda runtime) and holds a concurrency
# lock. See `vault_mtg_docs/engineering/architecture/decisions/` for the
# canonical-deploy-path decision note.

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sync
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/sync/go.mod

      - name: Download dependencies
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
          GOFLAGS: -mod=mod
        run: go mod download

      - name: Build
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go build ./...

      - name: Build Lambda binary (smoke check, arm64 — no deploy)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: |
          go build -tags lambda.norpc -trimpath -o /tmp/bootstrap ./cmd/lambda
          echo "Smoke-built Lambda bootstrap: $(ls -lh /tmp/bootstrap)"

      - name: Test
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go test -race ./...

      - name: Vet
        env:
          GONOSUMDB: github.com/RdHamilton/MTGA-Companion
          GOPRIVATE: github.com/RdHamilton/MTGA-Companion
        run: go vet ./...
