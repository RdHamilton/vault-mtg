<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240" role="img" aria-label="Windows SmartScreen protection dialog">
  <title>Windows SmartScreen protection dialog</title>

  <!-- Dialog background -->
  <rect x="20" y="10" width="360" height="220" rx="4" ry="4" fill="#f3f3f3" />

  <!-- Blue header band -->
  <rect x="20" y="10" width="360" height="80" rx="4" ry="4" fill="#0067c0" />
  <rect x="20" y="72" width="360" height="18" fill="#0067c0" />

  <!-- Windows Defender Shield icon -->
  <path d="M186 28 L200 24 L214 28 L214 50 Q214 62 200 68 Q186 62 186 50 Z" fill="white" opacity="0.95" />
  <path d="M191 42 L197 48 L210 36" stroke="#0067c0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Header text -->
  <text x="200" y="86" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="white">Windows protected your PC</text>

  <!-- Body text -->
  <text x="200" y="112" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#1a1a1a">Microsoft Defender SmartScreen prevented</text>
  <text x="200" y="128" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#1a1a1a">an unrecognized app from starting.</text>
  <text x="50" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#3d3d3d">App:</text>
  <text x="95" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">VaultMTG-Setup.exe</text>
  <text x="50" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#3d3d3d">Publisher:</text>
  <text x="110" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1a1a1a">Unknown Publisher</text>

  <!-- More info link -->
  <text x="50" y="192" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0067c0" text-decoration="underline">More info</text>

  <!-- Buttons -->
  <rect x="230" y="208" width="70" height="16" rx="2" fill="#0067c0" />
  <text x="265" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="white">Run anyway</text>
  <rect x="310" y="208" width="55" height="16" rx="2" fill="#d8d8d8" />
  <text x="337" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1a1a1a">Don't run</text>
</svg>
