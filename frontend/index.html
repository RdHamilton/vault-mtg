<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon"            href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180"    href="/apple-touch-icon.png" />
    <link rel="manifest"                            href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VaultMTG</title>

    <!-- Open Graph -->
    <meta property="og:title" content="VaultMTG — MTG Arena Companion" />
    <meta property="og:description" content="Track your drafts, deck win rates, and collection. Built for MTG Arena players." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://app.vaultmtg.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VaultMTG — MTG Arena Companion" />
    <meta name="twitter:description" content="Track your drafts, deck win rates, and collection. Built for MTG Arena players." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- VaultMTG Design System Fonts (Space Grotesk, Inter, JetBrains Mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />

    <!-- Google Analytics 4 (injected only when VITE_GA4_MEASUREMENT_ID is set) -->
    <script>
      (function () {
        var measurementId = '%VITE_GA4_MEASUREMENT_ID%';
        if (!measurementId || measurementId === '%VITE_GA4_MEASUREMENT_ID%') return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + measurementId;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() { window.dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', measurementId);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
